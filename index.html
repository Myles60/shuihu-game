}

// ===== 好汉驻守 → 已改为调动军团（showMoveLegion / doMoveLegion）=====

// ===== AI 系统（智能版）=====
function executeAITurn(factionId, animations) {
  const faction = FACTIONS.find(f => f.id === factionId);
  if (!faction) return;
  const fData = gameState.factions[factionId];
  const myLegions = fData.legions;
  if (myLegions.length === 0) return;

  // ===== 资源评估 =====
  const myLocs = Object.keys(gameState.locations).filter(id =>
    gameState.locations[id].owner === factionId
  );
  const totalTroops = myLegions.reduce((s, l) => s + l.troops, 0);
  const totalGrain = myLocs.reduce((s, id) => s + (gameState.locations[id].grain || 0), 0);
  const avgTroops = totalTroops / Math.max(myLegions.length, 1);

  // 动态调整攻击倾向（资源自适应）
  const baseStyle = faction.aiStyle;
  let dynamicAggression;
  if (myLegions.length <= 1 || totalTroops < 400) {
    dynamicAggression = 'defensive'; // 穷途末路，苟住
  } else if (totalTroops > 2000 && myLegions.length >= 4) {
    dynamicAggression = 'aggressive'; // 兵力雄厚，进攻！
  } else if (avgTroops < 300) {
    dynamicAggression = 'cautious'; // 兵力不足，谨慎
  } else {
    dynamicAggression = baseStyle; // 正常发挥
  }

  const styleParams = {
    aggressive: { attackChance: 0.70, minTroopRatio: 0.3, minAdvantage: 0.7,  patrolChance: 0.20, restFocus: false },
    balanced:   { attackChance: 0.45, minTroopRatio: 0.35, minAdvantage: 0.9,  patrolChance: 0.35, restFocus: false },
    cautious:   { attackChance: 0.28, minTroopRatio: 0.45, minAdvantage: 1.1,  patrolChance: 0.45, restFocus: true },
    defensive:  { attackChance: 0.15, minTroopRatio: 0.55, minAdvantage: 1.3,  patrolChance: 0.50, restFocus: true },
  };
  const sp = styleParams[dynamicAggression] || styleParams.balanced;

  // ===== 防守部署：确保重要据点有将驻守 =====
  // 优先保护大城和州府
  const importantLocs = myLocs.filter(id => {
    const loc = LOCATIONS.find(l => l.id === id);
    return loc && (loc.type === 'capital' || loc.type === 'city');
  });
  // 检查是否有重要据点无将
  const undefendedImportant = importantLocs.filter(id =>
    getLegionsAt(id, factionId).length === 0
  );
  // 如果有空闲武将，派去守重要据点
  if (undefendedImportant.length > 0 && myLegions.length > 1) {
    const movable = myLegions.filter(l =>
      getLegionsAt(l.locationId, factionId).length > 1 // 所在据点有多个武将
    );
    if (movable.length > 0 && undefendedImportant.length > 0) {
      const target = undefendedImportant[0];
      const legion = movable.reduce((a, b) => a.hero.power < b.hero.power ? a : b, movable[0]);
      if (getNeighbors(legion.locationId).some(n => n.locationId === target)) {
        legion.locationId = target;
        if (!gameState.locations[target].owner) gameState.locations[target].owner = factionId;
        // AI驻防（不显示日志）
      }
    }
  }

  // ===== 行动阶段 =====
  const actions = Math.min(myLegions.length, dynamicAggression === 'aggressive' ? 3 : 2);

  for (let a = 0; a < actions; a++) {
    if (Math.random() < sp.attackChance) {
      // ---- 智能进攻评估 ----
      const candidates = [];
      myLegions.forEach(legion => {
        const cap = getHeroTroopCap(legion.hero);
        if (legion.troops < cap * sp.minTroopRatio) return;
        const neighbors = getNeighbors(legion.locationId);
        neighbors.forEach(n => {
          const ns = gameState.locations[n.locationId];
          if (ns.owner === factionId) return;
          const defTotal = getTotalTroops(n.locationId, ns.owner || '');
          const defHero = ns.owner ? getBestHeroAt(n.locationId, ns.owner) : null;

          // 综合战力评估
          const terrainMod = { road: 1.0, mountain: 0.7, water: 0.6 };
          let myEffPower = legion.troops * (terrainMod[n.terrain] || 1.0) * (1 + legion.hero.power / 200);
          const defEffPower = defTotal * (1 + (defHero ? defHero.power : 0) / 200);

          // 水军/山路好汉修正
          if (n.terrain === 'water') {
            const waterIds = ['zhangshun','ruanxiaoer','ruanxiaowu','ruanxiaoqi','lichun','zhangheng'];
            if (waterIds.includes(legion.hero.id)) myEffPower /= 0.6;
          }
          if (n.terrain === 'mountain' && legion.hero.id === 'wusong') myEffPower /= 0.7;

          const advantage = myEffPower / Math.max(defEffPower, 1);
          if (advantage < sp.minAdvantage) return; // 胜算不够，不打

          // 评分：综合考虑
          let score = advantage * 10; // 基础分
          if (ns.owner === null) score += 5; // 中立优先
          if (n.terrain === 'road') score += 2; // 大道好走
          if (defHero && defHero.power > legion.hero.power + 10) score -= 3; // 敌将太强
          const locObj = LOCATIONS.find(l => l.id === n.locationId);
          if (locObj && locObj.type === 'capital') score += 3; // 首都价值高
          if (locObj && locObj.baseGrain >= 60) score += 2; // 高产粮据点

          candidates.push({ legion, toId: n.locationId, terrain: n.terrain, defTroops: defTotal, advantage, score });
        });
      });

      if (candidates.length > 0) {
        candidates.sort((a, b) => b.score - a.score);
        // 选得分最高的，激进型偶尔冒险
        const t = (dynamicAggression === 'aggressive' && Math.random() < 0.15)
          ? candidates[Math.floor(Math.random() * Math.min(candidates.length, 2))]
          : candidates[0];

        const toLoc = LOCATIONS.find(l => l.id === t.toId);
        const toOwner = gameState.locations[t.toId].owner;
        const defHero = toOwner ? getBestHeroAt(t.toId, toOwner) : null;

        // 如果目标是玩家据点且有守军，触发防守战斗界面
        if (toOwner === gameState.factionId && defHero) {
          gameState._pendingDefense = {
            aiFactionId: factionId,
            fromLocId: t.legion.locationId,
            toLocId: t.toId,
            terrain: t.terrain,
          };
          addLog(`⚠️ ${faction.name}${t.legion.hero.name} 率军来攻 ${toLoc.name}！迎战！`, 'bad');
          return;
        }

        const result = calculateCombat(
          Math.min(t.legion.troops, getHeroTroopCap(t.legion.hero)),
          t.legion.hero, t.defTroops, defHero,
          t.terrain, toLoc.type, factionId, toOwner
        );

        t.legion.troops -= result.attackerLoss;
        if (t.legion.troops < 0) t.legion.troops = 0;

        if (result.attackerWon) {
          const oldOwner = toOwner;
          const fromLoc = t.legion.locationId;
          gameState.locations[t.toId].owner = factionId;
          t.legion.locationId = t.toId;
          t.legion.troops = Math.max(t.legion.troops, 30);
          if (result.surrender && !fData.legions.some(l => l.hero.id === result.surrender.hero.id)) {
            if (oldOwner) {
              const oi = gameState.factions[oldOwner].legions.findIndex(l => l.hero.id === result.surrender.hero.id);
              if (oi >= 0) gameState.factions[oldOwner].legions.splice(oi, 1);
            }
            fData.legions.push(createLegion(result.surrender.hero, Math.floor(t.defTroops * 0.3), t.toId));
          }
          addLog(`⚔️ ${faction.name}${t.legion.hero.name} 攻占 ${toLoc.name}！（损${result.attackerLoss}兵）`, 'bad');
          if (animations) animations.push({ from: fromLoc, to: t.toId });
        } else {
          if (toOwner) {
            const defLegions = getLegionsAt(t.toId, toOwner);
            let rl = result.defenderLoss;
            defLegions.forEach(l => { if (rl > 0) { const d = Math.min(l.troops, rl); l.troops -= d; rl -= d; } });
          }
        }
        continue;
      }
    }

    // ---- 非进攻行动（运输 > 征兵 > 休整 > 巡视）----
    const nonAtkRoll = Math.random();

    // 1. 运输：后方多军团据点 → 前线薄弱据点调兵
    if (nonAtkRoll < 0.18 && myLegions.length >= 2) {
      const rearLocs = myLocs.filter(id => getLegionsAt(id, factionId).length >= 2);
      if (rearLocs.length > 0) {
        const rearLocId = rearLocs[Math.floor(Math.random() * rearLocs.length)];
        const rearLegions = getLegionsAt(rearLocId, factionId);
        // 调兵力最少的军团去相邻有敌情的据点
        const movable = rearLegions.reduce((a, b) => a.troops < b.troops ? a : b, rearLegions[0]);
        const neighbors = getNeighbors(rearLocId);
        const frontNeighbor = neighbors.find(n => {
          const nEff = getEffectiveOwner(n.locationId);
          return nEff === factionId && getLegionsAt(n.locationId, factionId).length < 2;
        });
        if (frontNeighbor) {
          const destName = LOCATIONS.find(l => l.id === frontNeighbor.locationId).name;
          movable.locationId = frontNeighbor.locationId;
          if (!gameState.locations[frontNeighbor.locationId].owner) gameState.locations[frontNeighbor.locationId].owner = factionId;
          // AI运输（不显示日志）
        }
      }
    }
    // 2. 征兵：粮草充裕时花粮补兵
    else if (nonAtkRoll < 0.35 && totalGrain > 200) {
      const needReinforce = myLegions.filter(l => l.troops < getHeroTroopCap(l.hero) * 0.7);
      if (needReinforce.length > 0) {
        const target = needReinforce[Math.floor(Math.random() * needReinforce.length)];
        const locGrain = gameState.locations[target.locationId].grain || 0;
        if (locGrain >= 120) {
          const amount = 80 + Math.floor(Math.random() * 80);
          const cost = Math.floor(amount * 1.3);
          const actualCost = Math.min(cost, locGrain);
          const actualAmount = Math.floor(actualCost / 1.3);
          target.troops = Math.min(target.troops + actualAmount, getHeroTroopCap(target.hero));
          gameState.locations[target.locationId].grain -= actualCost;
          // AI征兵（不显示日志）
        }
      }
    }
    // 3. 休整（防守型优先）
    else if (sp.restFocus && myLegions.length > 0) {
      const weak = myLegions.reduce((a, b) => a.troops < b.troops ? a : b, myLegions[0]);
      const wl = LOCATIONS.find(l => l.id === weak.locationId);
      if (wl) weak.troops = Math.min(weak.troops + Math.floor(wl.baseGrain * 2), getHeroTroopCap(weak.hero));
    }
    // 4. 巡视招将
    else if (Math.random() < sp.patrolChance) {
      const legion = myLegions[Math.floor(Math.random() * myLegions.length)];
      const locGrain = gameState.locations[legion.locationId].grain || 0;
      if (locGrain >= 20 && Math.random() < 0.50 && myLegions.length < 10) {
        const pool = HERO_POOL.filter(h => !gameState.usedHeroIds.has(h.id) && !h.hidden);
        if (pool.length > 0) {
          const hero = pool[Math.floor(Math.random() * pool.length)];
          fData.legions.push(createLegion(hero, hero.type === 'commander' ? 300 : (hero.type === 'warrior' ? 250 : 200), legion.locationId));
          gameState.usedHeroIds.add(hero.id);
          gameState.locations[legion.locationId].grain -= 30;
          // AI巡视招募（不显示日志）
        }
      }
    }
    // 5. 休整（默认）
    else {
      if (myLegions.length > 0) {
        const restLegion = myLegions.reduce((b, l) => l.troops > b.troops ? l : b, myLegions[0]);
        const rl = LOCATIONS.find(l => l.id === restLegion.locationId);
        if (rl) restLegion.troops = Math.min(restLegion.troops + Math.floor(rl.baseGrain * 1.5), getHeroTroopCap(restLegion.hero));
      }
    }
  }
}

// ===== 回合结算 =====
function endTurn() {
  if (!gameState) return;
  // 防止重复点击
  if (gameState._processingAI) return;
  gameState._processingAI = true;
  document.querySelector('#bottom-bar button').disabled = true;

  addLog(`--- 第 ${gameState.turn} 回合结束 ---`, 'info');
  doubleAttackUsed = false;

  // 张永旭永旭
  gameState.factions[gameState.factionId].legions.forEach(lg => {
    if (lg.hero.id === 'zhangyongxu' && lg.troops > 0) {
      lg.troops = Math.min(lg.troops + Math.floor(getHeroTroopCap(lg.hero) * 0.05), getHeroTroopCap(lg.hero));
    }
  });

  // 粮草结算
  const grainRates = { capital: 80, city: 50, fortress: 35, event: 25 };
  Object.entries(gameState.locations).forEach(([locId, state]) => {
    const effOwner = getEffectiveOwner(locId);
    if (effOwner) {
      const loc = LOCATIONS.find(l => l.id === locId);
      let bonus = grainRates[loc.type] || 40;
      const legionsHere = gameState.factions[effOwner].legions.filter(l => l.locationId === locId);
      if (legionsHere.some(l => l.hero.id === 'fangla_h')) bonus += 20;
      if (legionsHere.some(l => l.hero.id === 'shien') && locId === 'kuaihuolin') bonus *= 2;
      state.grain = (state.grain || 0) + bonus;
    }
  });

  // AI 顺序执行
  const aiFactions = FACTIONS.filter(f => f.id !== gameState.factionId);
  let aiIdx = 0;

  function runNextAI() {
    if (aiIdx >= aiFactions.length) {
      // 全部AI执行完毕
      updateAllLocationOwnership();
      Object.keys(gameState.scoutedLocations).forEach(locId => {
        if (!isScouted(locId)) delete gameState.scoutedLocations[locId];
      });
      finishEndTurn();
      return;
    }

    const f = aiFactions[aiIdx];
    const faction = FACTIONS.find(ff => ff.id === f.id);
    // AI行动开始（不显示日志）

    // 执行AI，收集动画
    const animations = [];
    const result = executeAITurnWithAnim(f.id, animations);

    // 如果触发了防守战斗，暂停AI并弹出战斗界面
    if (result === 'defense_triggered') {
      const pd = gameState._pendingDefense;
      // 保存恢复状态
      gameState._resumeAI = function() {
        gameState._resumeAI = null;
        aiIdx++;
        setTimeout(runNextAI, 400);
      };
      // 启动防守战斗（AI是进攻方，玩家是防守方）
      startBattle(pd.aiFactionId, gameState.factionId, pd.fromLocId, pd.toLocId, pd.terrain, false, null);
      return;
    }

    if (animations.length > 0) {
      // 播放动画序列
      let animIdx = 0;
      function playNextAnim() {
        if (animIdx >= animations.length) {
          aiIdx++;
          setTimeout(runNextAI, 200);
          return;
        }
        const a = animations[animIdx];
        addRouteAnimation(a.from, a.to, faction.color, faction.name);
        animIdx++;
        setTimeout(playNextAnim, 700);
      }
      playNextAnim();
    } else {
      aiIdx++;
      setTimeout(runNextAI, 300);
    }
  }

  setTimeout(runNextAI, 400);
}

function finishEndTurn() {
  // 检查阵营存亡
  FACTIONS.forEach(f => {
    if (f.id === gameState.factionId) return;
    const hasLegions = gameState.factions[f.id].legions.length > 0;
    const hasLocations = Object.values(gameState.locations).some(l => l.owner === f.id);
    if (!hasLegions && !hasLocations) {
      addLog(`💀 ${f.name} 已被消灭！`, 'bad');
    }
  });

  gameState.turn++;
  resetActionPoints();
  selectedLocation = null;
  gameState._processingAI = false;
  document.querySelector('#bottom-bar button').disabled = false;
  renderMap();
  updateUI();
  updateSidePanel();
  addLog(`=== 第 ${gameState.turn} 回合 === 行动力: ${gameState.actionPoints}`, 'info');
  checkVictory();
}

// 带动画收集的AI执行
function executeAITurnWithAnim(factionId, animations) {
  executeAITurn(factionId, animations);
  if (gameState._pendingDefense) return 'defense_triggered';
}

function updateActionPoints() {
  if (!gameState) return;
  const ownedCount = Object.keys(gameState.locations).filter(id => getEffectiveOwner(id) === gameState.factionId).length;
  const hasSongJiang = gameState.factions[gameState.factionId].legions.some(l => l.hero.id === 'songjiang');
  const bonus = hasSongJiang ? 1 : 0;
  gameState.maxActionPoints = 3 + Math.floor(ownedCount / 2) + bonus;
}

function resetActionPoints() {
  updateActionPoints();
  gameState.actionPoints = gameState.maxActionPoints;
}

function checkVictory() {
  const otherFactions = new Set(
    Object.keys(gameState.locations).map(id => getEffectiveOwner(id)).filter(oid => oid && oid !== gameState.factionId)
  );
  if (otherFactions.size === 0) {
    const winner = FACTIONS.find(f => f.id === gameState.factionId).name;
    addLog(`🏆 天下归一！${winner} 统一天下！`, 'good');
    setTimeout(() => alert('🎉 恭喜！你统一了天下！\n\n点击确定返回主菜单。'), 500);
  }
}

// ===== 存档系统 =====
function saveGame() {
  if (!gameState) { alert('没有进行中的游戏！'); return; }
  const saveData = { ...gameState, usedHeroIds: [...gameState.usedHeroIds], logs: gameState.logs.slice(-30) };
  localStorage.setItem('shuihu_save', JSON.stringify(saveData));
  addLog('💾 游戏已存档！', 'info');
}

function loadGame() {
  const raw = localStorage.getItem('shuihu_save');
  if (!raw) { alert('没有找到存档！'); return; }
  try {
    const saveData = JSON.parse(raw);
    gameState = saveData;
    gameState.usedHeroIds = new Set(saveData.usedHeroIds || []);
    gameState.scoutedLocations = saveData.scoutedLocations || {};
    playerFaction = gameState.factionId;
    adjacency = buildAdjacency();
    document.getElementById('faction-select').style.display = 'none';
    selectedLocation = null;
    doubleAttackUsed = false;

    const logEl = document.getElementById('event-log');
    logEl.innerHTML = '';
    gameState.logs.forEach(l => {
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + (l.type || 'info');
      entry.textContent = l.msg;
      logEl.appendChild(entry);
    });

    resizeCanvas();
    setupMapClick();
    renderMap();
    updateUI();
    updateSidePanel();
    addLog('📂 存档已读取！', 'info');
  } catch (e) {
    alert('存档损坏，无法读取！');
  }
}

// ===== Canvas 地图渲染 =====
function getCanvas() { return document.getElementById('game-map'); }

function resizeCanvas() {
  const canvas = getCanvas();
  const container = document.getElementById('map-container');
  canvas.width = container.clientWidth;
  canvas.height = container.clientHeight;
  if (gameState) renderMap();
}
window.addEventListener('resize', resizeCanvas);

function scaleCoord(x, y) {
  const canvas = getCanvas();
  return { sx: (x / 2200) * canvas.width, sy: (y / 1400) * canvas.height };
}

function setupMapClick() {
  const canvas = getCanvas();
  const tooltip = document.getElementById('map-tooltip');

  canvas.onclick = (e) => {
    if (!gameState) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let clicked = null, minDist = Infinity;
    LOCATIONS.forEach(loc => {
      const { sx, sy } = scaleCoord(loc.x, loc.y);
      const dist = Math.sqrt((mx - sx) ** 2 + (my - sy) ** 2);
      if (dist < 32 && dist < minDist) { clicked = loc.id; minDist = dist; }
    });

    // 撤退模式：地图选目的地
    if (pendingBattleRetreat && clicked) {
      if (handleRetreatMapClick(clicked)) {
        renderMap();
        updateSidePanel();
        return;
      }
    }

    selectedLocation = clicked;
    renderMap();
    updateSidePanel();
  };

  canvas.onmousemove = (e) => {
    if (!gameState) { tooltip.style.display = 'none'; return; }
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let hovered = null, minDist = Infinity;
    LOCATIONS.forEach(loc => {
      const { sx, sy } = scaleCoord(loc.x, loc.y);
      const dist = Math.sqrt((mx - sx) ** 2 + (my - sy) ** 2);
      if (dist < 28 && dist < minDist) { hovered = loc; minDist = dist; }
    });
    if (hovered) {
      const state = gameState.locations[hovered.id];
      const effOwner = getEffectiveOwner(hovered.id);
      const ownerFaction = effOwner ? FACTIONS.find(f => f.id === effOwner) : null;
      const totalTroops = effOwner ? getTotalTroops(hovered.id, effOwner) : 0;
      const typeNames = { capital: '大城', city: '州府', fortress: '山寨', event: '事件地' };
      tooltip.innerHTML = `
        <div class="tt-name">${hovered.name}</div>
        <div class="tt-row"><span class="tt-label">类型</span><span class="tt-value">${typeNames[hovered.type]}</span></div>
        <div class="tt-row"><span class="tt-label">归属</span><span class="tt-value" style="color:${ownerFaction ? ownerFaction.color : '#888'}">${ownerFaction ? ownerFaction.name : '中立'}</span></div>
        <div class="tt-row"><span class="tt-label">兵力</span><span class="tt-value">${effOwner ? (effOwner === gameState.factionId || isScouted(hovered.id) ? totalTroops + '人' : '? 不明') : '无人驻守'}</span></div>
        ${hovered.event ? '<div class="tt-row"><span class="tt-label"></span><span class="tt-value" style="color:#ff9800;">⚡可触发事件</span></div>' : ''}
      `;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  };

  canvas.onmouseleave = () => { tooltip.style.display = 'none'; };
}

function renderMap() {
  const canvas = getCanvas();
  if (!canvas || !gameState) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const BW = (w / 1400);

  // ===== 底色：浅米色干净底 =====
  ctx.fillStyle = '#f5f0e0';
  ctx.fillRect(0, 0, w, h);

  // ===== 连线 =====
  CONNECTIONS.forEach(conn => {
    const fLoc = LOCATIONS.find(l => l.id === conn.from);
    const tLoc = LOCATIONS.find(l => l.id === conn.to);
    if (!fLoc || !tLoc) return;
    const f = scaleCoord(fLoc.x, fLoc.y);
    const t = scaleCoord(tLoc.x, tLoc.y);

    const tColors = {
      road:     { bg: 'rgba(180,150,110,0.3)', line: '#8b7355', dash: [] },
      mountain: { bg: 'rgba(140,160,130,0.25)', line: '#6b8b5a', dash: [7, 5] },
      water:    { bg: 'rgba(130,170,210,0.25)', line: '#5a80b0', dash: [5, 7] },
    };
    const tc = tColors[conn.terrain] || tColors.road;

    // 底色带
    ctx.beginPath(); ctx.moveTo(f.sx, f.sy); ctx.lineTo(t.sx, t.sy);
    ctx.strokeStyle = tc.bg; ctx.lineWidth = 8 * BW; ctx.stroke();
    // 主线
    ctx.beginPath(); ctx.moveTo(f.sx, f.sy); ctx.lineTo(t.sx, t.sy);
    ctx.strokeStyle = tc.line; ctx.lineWidth = 2.5 * BW;
    ctx.setLineDash(tc.dash); ctx.stroke(); ctx.setLineDash([]);
  });

  // ===== 行军动画粒子 =====
  routeAnimations.forEach(a => {
    if (a.progress <= 0 || a.progress >= 1) return;
    const f = scaleCoord(a.fromX, a.fromY);
    const t = scaleCoord(a.toX, a.toY);
    // 缓动：先快后慢
    const p = 1 - Math.pow(1 - a.progress, 3);
    const cx = f.sx + (t.sx - f.sx) * p;
    const cy = f.sy + (t.sy - f.sy) * p;
    const alpha = 1 - Math.abs(a.progress - 0.5) * 2; // 中间最亮

    // 尾部光晕
    for (let i = 0; i < 3; i++) {
      const tp = Math.max(0, p - i * 0.08);
      const tx = f.sx + (t.sx - f.sx) * tp;
      const ty = f.sy + (t.sy - f.sy) * tp;
      const ta = alpha * (1 - i * 0.3);
      const grd = ctx.createRadialGradient(tx, ty, 0, tx, ty, 8 * BW);
      grd.addColorStop(0, a.color);
      grd.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.globalAlpha = ta;
      ctx.beginPath(); ctx.arc(tx, ty, 8 * BW, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  // ===== 撤退模式：高亮可选目的地 =====
  if (pendingBattleRetreat && pendingBattleRetreat.options) {
    pendingBattleRetreat.options.forEach(o => {
      const loc = LOCATIONS.find(l => l.id === o.locationId);
      if (!loc) return;
      const { sx, sy } = scaleCoord(loc.x, loc.y);
      const r = 28 * BW;
      // 脉冲光圈
      const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 500);
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(76,175,80,${0.3 * pulse})`;
      ctx.fill();
      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 3 * BW;
      ctx.setLineDash([6 * BW, 3 * BW]);
      ctx.stroke();
      ctx.setLineDash([]);
      // 标签
      ctx.fillStyle = '#4caf50';
      ctx.font = `bold ${13 * BW}px "Microsoft YaHei"`;
      ctx.textAlign = 'center';
      ctx.fillText('📍 可撤退', sx, sy - 35 * BW);
    });
  }

  // ===== 据点 =====
  LOCATIONS.forEach(loc => {
    const { sx, sy } = scaleCoord(loc.x, loc.y);
    const effOwner = getEffectiveOwner(loc.id);
    const ownerFaction = effOwner ? FACTIONS.find(f => f.id === effOwner) : null;
    const color = ownerFaction ? ownerFaction.color : '#999';
    const isSelected = selectedLocation === loc.id;

    // 选中光环
    if (isSelected) {
      const r = (loc.type === 'capital' ? 30 : loc.type === 'city' ? 24 : 19) * BW;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,200,0,0.3)'; ctx.fill();
      ctx.strokeStyle = '#e0a000'; ctx.lineWidth = 3 * BW; ctx.stroke();
    }

    // 形状
    const sz = (loc.type === 'capital' ? 21 : loc.type === 'city' ? 16 : 13) * BW;
    ctx.beginPath();
    if (loc.type === 'capital') {
      ctx.roundRect(sx - sz, sy - sz, sz * 2, sz * 2, 5 * BW);
    } else if (loc.type === 'city') {
      ctx.moveTo(sx, sy - sz); ctx.lineTo(sx + sz, sy);
      ctx.lineTo(sx, sy + sz); ctx.lineTo(sx - sz, sy);
    } else {
      ctx.arc(sx, sy, sz, 0, Math.PI * 2);
    }
    ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5 * BW; ctx.stroke();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2 * BW; ctx.stroke();

    // 名称
    ctx.fillStyle = '#111';
    ctx.font = `bold ${16 * BW}px "Microsoft YaHei"`;
    ctx.textAlign = 'center';
    ctx.fillText(loc.name, sx, sy + 44 * BW);

    // 守将（战争迷雾：敌方未侦察则不显示）
    if (effOwner) {
      const isPlayerOwned = effOwner === gameState.factionId;
      const showGarrison = isPlayerOwned || isScouted(loc.id);
      if (showGarrison) {
        const legs = gameState.factions[effOwner].legions.filter(l => l.locationId === loc.id);
        if (legs.length > 0) {
          const best = legs.reduce((b, l) => (l.hero.power > b.hero.power ? l : b), legs[0]).hero;
          ctx.fillStyle = '#c0392b';
          ctx.font = `bold ${12 * BW}px "Microsoft YaHei"`;
          ctx.fillText('●' + best.name + (legs.length > 1 ? '+' + (legs.length - 1) : ''), sx, sy + 58 * BW);
        }
      } else {
        ctx.fillStyle = '#999';
        ctx.font = `bold ${12 * BW}px "Microsoft YaHei"`;
        ctx.fillText('? 兵力不明', sx, sy + 58 * BW);
      }
    }
  });

  // ===== 图例 =====
  const lx = 12, ly0 = 12;
  ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.roundRect(lx - 4, ly0 - 4, 90, 60, 6); ctx.fill(); ctx.stroke();
  let ly = ly0 + 4;
  ctx.font = 'bold 10px "Microsoft YaHei"';
  [
    { label: '大道', color: '#8b7355', dash: [] },
    { label: '山路', color: '#6b8b5a', dash: [7, 5] },
    { label: '水路', color: '#5a80b0', dash: [5, 7] },
  ].forEach(item => {
    ctx.beginPath(); ctx.moveTo(lx, ly + 5); ctx.lineTo(lx + 32, ly + 5);
    ctx.strokeStyle = item.color; ctx.lineWidth = 2.2;
    ctx.setLineDash(item.dash); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#333'; ctx.textAlign = 'left';
    ctx.fillText(item.label, lx + 38, ly + 9);
    ly += 18;
  });
}

// ===== UI 更新 =====
function updateUI() {
  if (!gameState) return;
  document.getElementById('turn-num').textContent = gameState.turn;
  // 粮草各据点独立，不在顶部汇总
  document.getElementById('ap-display').textContent = gameState.actionPoints + '/' + gameState.maxActionPoints;
  const ownedCount = Object.values(gameState.locations).filter(l => l.owner === gameState.factionId).length;
  document.getElementById('location-count').textContent = ownedCount;

  // 我的军团列表
  const myLegions = gameState.factions[gameState.factionId].legions;
  const typeNames = { commander: '统帅', warrior: '武将', strategist: '军师' };
  document.getElementById('my-heroes').innerHTML = myLegions.length === 0
    ? '<span style="color:#aaa;">暂无军团，巡视据点招募好汉</span>'
    : myLegions.map(lg => {
        const locName = LOCATIONS.find(l => l.id === lg.locationId).name;
        return `<div style="padding:2px 0;">⭐${lg.hero.name} <span style="color:#888;">${typeNames[lg.hero.type]} 战力${lg.hero.power} | ${lg.troops}人</span> <span style="color:#4a90d9;">[${locName}]</span></div>`;
      }).join('');
}

function updateSidePanel() {
  const panel = document.getElementById('location-info');
  const btnPanel = document.getElementById('action-buttons');
  if (!selectedLocation || !gameState) {
    panel.innerHTML = '<h2>📍 据点信息</h2><p style="color:#aaa;font-size:13px;">点击地图上的据点查看详情</p>';
    btnPanel.innerHTML = '';
    return;
  }

  const loc = LOCATIONS.find(l => l.id === selectedLocation);
  const state = gameState.locations[selectedLocation];
  if (!loc || !state) return;

  // 使用有效归属（有将领驻守才算）
  const effOwner = getEffectiveOwner(selectedLocation);
  const ownerFaction = effOwner ? FACTIONS.find(f => f.id === effOwner) : null;
  const isPlayerOwned = effOwner === gameState.factionId;
  const isEnemyOwned = effOwner && effOwner !== gameState.factionId;
  const isNeutral = !effOwner;
  const typeNames = { capital: '🏛️ 大城', city: '🏘️ 州府', fortress: '🏔️ 山寨', event: '📜 事件地' };

  const neighbors = getNeighbors(selectedLocation);
  const terrainInfo = neighbors.map(n => {
    const nl = LOCATIONS.find(l => l.id === n.locationId);
    const tNames = { road: '大道', mountain: '山路', water: '水路' };
    return nl ? `${nl.name}(${tNames[n.terrain]})` : '';
  }).join('、') || '无';

  // 兵力显示：己方/中立/已侦察 → 显示详情；敌方未侦察 → 隐藏
  let troopInfo = '';
  const showDetails = isPlayerOwned || isNeutral || isScouted(selectedLocation);

  if (showDetails) {
    if (effOwner) {
      const total = getTotalTroops(selectedLocation, effOwner);
      const legions = gameState.factions[effOwner].legions.filter(l => l.locationId === selectedLocation);
      if (legions.length > 0) {
        troopInfo = '';
        legions.forEach(l => {
          troopInfo += `⭐${l.hero.name} 率 ${l.troops} 人<br>`;
        });
        troopInfo += `<span style="color:#4caf50;">总计 ${total} 人</span>`;
      } else {
        troopInfo = '<span style="color:#888;">无将领驻守</span>';
      }
    } else {
      troopInfo = '<span style="color:#888;">无主（无驻军）</span>';
    }
  } else {
    // 未侦察的敌方据点
    troopInfo = '<span style="color:#f44336;">❓ 兵力不明（未侦察）</span>';
  }

  // 侦察情报过期提示
  let scoutNote = '';
  if (isEnemyOwned && isScouted(selectedLocation)) {
    const remaining = SCOUT_DURATION - (gameState.turn - gameState.scoutedLocations[selectedLocation]);
    scoutNote = `<div class="info-row"><span class="label">情报</span><span class="value" style="color:#4caf50;">🔭 已侦察（剩余${remaining}回合）</span></div>`;
  }

  panel.innerHTML = `
    <h2>📍 ${loc.name}</h2>
    <div class="info-row"><span class="label">类型</span><span class="value">${typeNames[loc.type]}</span></div>
    <div class="info-row"><span class="label">归属</span><span class="value" style="color:${ownerFaction ? ownerFaction.color : '#888'}">${ownerFaction ? ownerFaction.name : '中立'}</span></div>
    <div class="info-row"><span class="label">兵力</span><span class="value" style="font-size:12px;">${troopInfo}</span></div>
    ${scoutNote}
    ${showDetails ? `<div class="info-row"><span class="label">存粮</span><span class="value">🌾 ${state.grain || 0} <span style="color:#888;font-size:11px;">(+${loc.type === 'capital' ? 80 : loc.type === 'city' ? 50 : loc.type === 'fortress' ? 35 : 25}/回合${effOwner ? '' : ' 需驻军'})</span></span></div>` : ''}
    <div class="info-row"><span class="label">相邻</span><span class="value" style="font-size:11px;">${terrainInfo}</span></div>
    ${loc.event ? '<div class="info-row"><span class="label">事件</span><span class="value" style="color:#ffa500;">⚠ 可触发原著事件</span></div>' : ''}
  `;

  let buttons = '';
  if (isPlayerOwned) {
    buttons += `<button onclick="doPatrol('${selectedLocation}')" ${gameState.actionPoints < 1 ? 'disabled' : ''}>🔍 巡视</button>`;
    buttons += `<button onclick="doRest('${selectedLocation}')" ${gameState.actionPoints < 1 ? 'disabled' : ''}>🏕️ 休整</button>`;
    const hasMyLegions = getLegionsAt(selectedLocation, gameState.factionId).length > 0;
    const friendly = neighbors.filter(n => getEffectiveOwner(n.locationId) === gameState.factionId);
    if (hasMyLegions && friendly.length > 0) {
      buttons += `<button onclick="showTransport('${selectedLocation}')" ${gameState.actionPoints < 1 ? 'disabled' : ''}>📦 运输</button>`;
    }
    const attackable = neighbors.filter(n => getEffectiveOwner(n.locationId) !== gameState.factionId);
    if (hasMyLegions && attackable.length > 0) {
      buttons += `<button onclick="showAttackOptions('${selectedLocation}')" ${gameState.actionPoints < 1 ? 'disabled' : ''}>⚔️ 进攻</button>`;
    }
    // 侦察邻接敌方据点
    const scoutTargets = neighbors.filter(n => {
      const nEff = getEffectiveOwner(n.locationId);
      return nEff && nEff !== gameState.factionId && !isScouted(n.locationId);
    });
    if (hasMyLegions && scoutTargets.length > 0) {
      buttons += `<button onclick="showScoutOptions('${selectedLocation}')" ${gameState.actionPoints < 1 ? 'disabled' : ''}>🔭 侦察</button>`;
    }
    // 征兵（消耗1行动力 + 本地粮草）
    const locGrain = gameState.locations[selectedLocation].grain || 0;
    if (hasMyLegions && locGrain >= 1 && gameState.actionPoints >= 1) {
      buttons += `<button onclick="showRecruitUI('${selectedLocation}')">📋 征兵</button>`;
    }
  }
  btnPanel.innerHTML = buttons;
}

// ===== 面板折叠/展开 =====
let panelVisible = true;
function togglePanel() {
  const panel = document.getElementById('side-panel');
  const handle = document.getElementById('resize-handle');
  panelVisible = !panelVisible;
  if (panelVisible) {
    panel.classList.remove('collapsed');
    handle.classList.remove('hidden');
  } else {
    panel.classList.add('collapsed');
    handle.classList.add('hidden');
  }
  setTimeout(() => { resizeCanvas(); renderMap(); }, 100);
}

// ===== 拖拽调整面板宽度 =====
(function setupResize() {
  const handle = document.getElementById('resize-handle');
  const panel = document.getElementById('side-panel');
  let dragging = false, startX, startWidth;

  handle.addEventListener('mousedown', (e) => {
    dragging = true;
    startX = e.clientX;
    startWidth = panel.offsetWidth;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const delta = startX - e.clientX;
    const newWidth = Math.max(240, Math.min(600, startWidth + delta));
    panel.style.width = newWidth + 'px';
    resizeCanvas();
    renderMap();
  });

  document.addEventListener('mouseup', () => {
    if (dragging) {
      dragging = false;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  });
})();

// ===== 屏幕震动 =====
function triggerScreenShake() {
  const overlay = document.getElementById('battle-overlay');
  if (!overlay || !overlay.classList.contains('active')) return;
  overlay.style.animation = 'none';
  overlay.offsetHeight; // reflow
  overlay.style.animation = 'shake 0.4s ease-out';
  setTimeout(() => { overlay.style.animation = ''; }, 400);
}

// ===== 飘伤害数字 =====
function showFloatingDamage(x, y, amount, isHeal) {

  el.className = 'float-damage';

  el.style.top = y + 'px';

// ===== 回合制战斗系统（重构版）=====
let battle = null; // 战斗状态机
let battleResultTimer = null; // combat_result 自动继续计时器

// 辅助函数：判断当前玩家是否为主动方
function isPlayerActive() {
  return (battle.activeSide === 'attacker') === battle.isPlayerAttacker;
}

// 辅助函数：获取主动方/被动方数据
function getActiveLegions() {
  return battle.activeSide === 'attacker' ? battle.attLegions : battle.defLegions;
}
function getPassiveLegions() {
  return battle.activeSide === 'attacker' ? battle.defLegions : battle.attLegions;
}
function getActiveRetreated() {
  return battle.activeSide === 'attacker' ? battle.retreated.attacker : battle.retreated.defender;
}
function getPassiveRetreated() {
  return battle.activeSide === 'attacker' ? battle.retreated.defender : battle.retreated.attacker;
}
function getMySelection() {
  return battle.activeSide === 'attacker' ? battle.selectedAttIdx : battle.selectedDefIdx;
}
function getEnemySelection() {
  return battle.activeSide === 'attacker' ? battle.selectedDefIdx : battle.selectedAttIdx;
}
function setMySelection(idx) {
  if (battle.activeSide === 'attacker') battle.selectedAttIdx = idx;
  else battle.selectedDefIdx = idx;
}
function setEnemySelection(idx) {
  if (battle.activeSide === 'attacker') battle.selectedDefIdx = idx;
  else battle.selectedAttIdx = idx;
}
function clearSelections() {
  battle.selectedAttIdx = null;
  battle.selectedDefIdx = null;
}

function startBattle(attackerId, defenderId, fromLocId, toLocId, terrain, isPlayerAttacker, attackerLegionIndices) {
  const attFaction = FACTIONS.find(f => f.id === attackerId);
  const defFaction = FACTIONS.find(f => f.id === defenderId);
  const fromLoc = LOCATIONS.find(l => l.id === fromLocId);
  const toLoc = LOCATIONS.find(l => l.id === toLocId);

  let attLegionsAtLoc = gameState.factions[attackerId].legions
    .filter(l => l.locationId === fromLocId);
  // 如果指定了将领列表，只带选中的
  if (attackerLegionIndices) {
    attLegionsAtLoc = attackerLegionIndices.map(i => attLegionsAtLoc[i]).filter(Boolean);
  }
  const attLegions = attLegionsAtLoc
    .map(l => ({ hero: { ...l.hero, skill: { ...l.hero.skill } }, troops: l.troops, origTroops: l.troops }));

  const defLegions = defenderId
    ? gameState.factions[defenderId].legions
        .filter(l => l.locationId === toLocId)
        .map(l => ({ hero: { ...l.hero, skill: { ...l.hero.skill } }, troops: l.troops, origTroops: l.troops }))
    : [];

  battle = {
    attackerId, defenderId, fromLocId, toLocId, terrain, isPlayerAttacker,
    attFaction, defFaction, fromLoc, toLoc,
    attLegions, defLegions,
    selectedAttIdx: null, selectedDefIdx: null,
    activeSide: 'attacker',
    phase: 'action_choice',
    round: 1,
    log: [],
    retreated: { attacker: [], defender: [] },
    surrendered: { attacker: [], defender: [] },
    retreatDest: {}, // { 'attacker_0': locId, 'defender_1': locId } 撤退目的地
    lastResult: null,
    _activePickedIdx: null, // 主动方选中的武将索引
    attHeroIds: attLegions.map(l => l.hero.id),  // 参战将领ID（用于精确写回）
    defHeroIds: defLegions.map(l => l.hero.id),
  };

  // AI vs AI：自动结算，不弹战斗界面
  const playerInvolved = battle.attackerId === gameState.factionId || battle.defenderId === gameState.factionId;
  if (!playerInvolved) {
    autoResolveAIBattle();
    return;
  }

  document.getElementById('battle-overlay').classList.add('active');
  renderBattle();
  if (!isPlayerActive()) {
    battle._aiActionTimer = setTimeout(() => aiChooseAction(), 700);
  }
}

// AI vs AI 自动战斗结算
function autoResolveAIBattle() {
  const attPower = battle.attLegions.reduce((s, l) => s + l.troops * (1 + l.hero.power / 200), 0);
  const defPower = battle.defLegions.reduce((s, l) => s + l.troops * (1 + l.hero.power / 200), 0);
  const terrainMod = { road: 1.0, mountain: 0.75, water: 0.60 };
  const attEff = attPower * (terrainMod[battle.terrain] || 1.0);
  const defEff = defPower * 1.1;

  let winner;
  if (attEff > defEff * 1.3) {
    winner = 'attacker';
  } else if (defEff > attEff * 1.3) {
    winner = 'defender';
  } else {
    winner = Math.random() < 0.5 ? 'attacker' : 'defender';
  }

  // 应用损失
  const attTotal = battle.attLegions.reduce((s, l) => s + l.troops, 0);
  const defTotal = battle.defLegions.reduce((s, l) => s + l.troops, 0);
  const attLossPct = winner === 'attacker' ? (0.15 + Math.random() * 0.15) : (0.50 + Math.random() * 0.30);
  const defLossPct = winner === 'defender' ? (0.15 + Math.random() * 0.15) : (0.50 + Math.random() * 0.30);

  battle.attLegions.forEach(l => { l.troops = Math.max(0, Math.floor(l.troops * (1 - attLossPct))); });
  battle.defLegions.forEach(l => { l.troops = Math.max(0, Math.floor(l.troops * (1 - defLossPct))); });

  endBattle(winner);
}

function endBattle(winner) {
  if (battleResultTimer) { clearTimeout(battleResultTimer); battleResultTimer = null; }
  battle.phase = 'finished';
  battle.winner = winner;

  const attFactionData = gameState.factions[battle.attackerId];
  const defFactionData = gameState.factions[battle.defenderId];

  // 只移除实际参战的将领（未参战的留在原据点）
  attFactionData.legions = attFactionData.legions.filter(l =>
    !(l.locationId === battle.fromLocId && battle.attHeroIds.includes(l.hero.id))
  );
  if (battle.defenderId) {
    defFactionData.legions = defFactionData.legions.filter(l =>
      !(l.locationId === battle.toLocId && battle.defHeroIds.includes(l.hero.id))
    );
  }

  // 写回进攻方（非撤退、非叛变军团）
  const attSurrendered = battle.surrendered ? battle.surrendered.attacker : [];
  battle.attLegions.forEach((l, i) => {
    if (!battle.retreated.attacker.includes(i) && !attSurrendered.includes(i) && l.troops > 0) {
      const locId = winner === 'attacker' ? battle.toLocId : battle.fromLocId;
      attFactionData.legions.push(createLegion(l.hero, l.troops, locId));
    }
  });
  // 写回进攻方（撤退军团 → 使用指定目的地或默认回出发点）
  battle.retreated.attacker.forEach(i => {
    const l = battle.attLegions[i];
    if (l.troops > 0) {
      const destKey = `attacker_${i}`;
      const destLocId = battle.retreatDest[destKey];
      if (destLocId) {
        // 如果撤退到无主据点，自动占领
        if (!gameState.locations[destLocId].owner) {
          gameState.locations[destLocId].owner = battle.attackerId;
        }
        attFactionData.legions.push(createLegion(l.hero, l.troops, destLocId));
      } else if (destLocId === null) {
        // 放弃撤退，武将阵亡（不写回）
      } else {
        // 未指定目的地，默认回出发点
        attFactionData.legions.push(createLegion(l.hero, l.troops, battle.fromLocId));
      }
    }
  });

  // 写回防守方（非撤退军团）
  const defSurrendered = battle.surrendered ? battle.surrendered.defender : [];
  battle.defLegions.forEach((l, i) => {
    if (!battle.retreated.defender.includes(i) && !defSurrendered.includes(i) && l.troops > 0 && battle.defenderId) {
      defFactionData.legions.push(createLegion(l.hero, l.troops, battle.toLocId));
    }
  });
  // 写回防守方（撤退军团 → 使用指定目的地或默认找相邻己方据点）
  battle.retreated.defender.forEach(i => {
    const l = battle.defLegions[i];
    if (l.troops > 0 && battle.defenderId) {
      const destKey = `defender_${i}`;
      const destLocId = battle.retreatDest[destKey];
      if (destLocId) {
        // 如果撤退到无主据点，自动占领
        if (!gameState.locations[destLocId].owner) {
          gameState.locations[destLocId].owner = battle.defenderId;
        }
        defFactionData.legions.push(createLegion(l.hero, l.troops, destLocId));
      } else if (destLocId === null) {
        // 放弃撤退，武将阵亡（不写回）
      } else {
        // 未指定目的地，找相邻己方据点，没有则留原地
        const neighbors = getNeighbors(battle.toLocId);
        const friendly = neighbors.find(n => getEffectiveOwner(n.locationId) === battle.defenderId);
        const neutral = neighbors.find(n => !getEffectiveOwner(n.locationId));
        const retreatLoc = friendly ? friendly.locationId : (neutral ? neutral.locationId : battle.toLocId);
        if (neutral && !friendly && !gameState.locations[neutral.locationId].owner) {
          gameState.locations[neutral.locationId].owner = battle.defenderId;
        }
        defFactionData.legions.push(createLegion(l.hero, l.troops, retreatLoc));
      }
    }
  });

  // ===== 处理叛变投降（武将投靠敌方阵营）=====
  if (battle.surrendered) {
    // 进攻方叛变 → 投靠防守方
    battle.surrendered.attacker.forEach(i => {
      const l = battle.attLegions[i];
      if (l && l.troops > 0 && battle.defenderId) {
        defFactionData.legions.push(createLegion(l.hero, l.troops, battle.toLocId));
        addLog(`🏳️ ${l.hero.name} 叛变投靠了${battle.defFaction.name}！`, 'system');
      }
    });
    // 防守方叛变 → 投靠进攻方
    battle.surrendered.defender.forEach(i => {
      const l = battle.defLegions[i];
      if (l && l.troops > 0 && battle.attackerId) {
        attFactionData.legions.push(createLegion(l.hero, l.troops, battle.fromLocId));
        addLog(`🏳️ ${l.hero.name} 叛变投靠了${battle.attFaction.name}！`, 'system');
      }
    });
  }

  // 生成战斗结果消息
  let resultTitle, resultMsg, resultColor;
  const playerInvolved = battle.attackerId === gameState.factionId || battle.defenderId === gameState.factionId;
  const playerIsAttacker = battle.attackerId === gameState.factionId;
  const playerIsDefender = battle.defenderId === gameState.factionId;

  if (winner === 'attacker') {
    gameState.locations[battle.toLocId].owner = battle.attackerId;
    if (battle.isPlayerAttacker) gameState.actionPoints -= 1;
    if (playerInvolved) {
      addLog(`⚔️ ${battle.attFaction.name} 攻占 ${battle.toLoc.name}！`, 'good');
    } else {
      addLog(`⚔️ ${battle.attFaction.name} 攻占 ${battle.toLoc.name}`, 'good');
    }
    battle.defLegions.forEach((l, i) => {
      if (l.troops <= 0 && !battle.retreated.defender.includes(i)) {
        const alreadyOwned = attFactionData.legions.some(al => al.hero.id === l.hero.id);
        if (!alreadyOwned) {
          attFactionData.legions.push(createLegion(l.hero, Math.floor(l.origTroops * 0.25), battle.toLocId));
          if (playerInvolved) addLog(`⛓️ 俘虏了 ${l.hero.name}！加入你的阵营！`, 'good');
        }
      }
    });
    if (playerInvolved) {
      if (playerIsAttacker) {
        resultTitle = '🏆 进攻大胜！';
        resultMsg = `我军成功攻占 ${battle.toLoc.name}！`;
        resultColor = '#4caf50';
      } else {
        resultTitle = '💀 防守失败！';
        resultMsg = `${battle.toLoc.name} 被 ${battle.attFaction.name} 攻陷！`;
        resultColor = '#f44336';
      }
    }
  } else if (winner === 'draw') {
    if (battle.isPlayerAttacker) gameState.actionPoints -= 1;
    if (playerInvolved) {
      addLog(`🤝 双方武将在 ${battle.toLoc.name} 同归于尽！`, 'info');
    } else {
      addLog(`🤝 ${battle.attFaction.name} 与 ${battle.defFaction ? battle.defFaction.name : '中立军'} 在 ${battle.toLoc.name} 两败俱伤`, 'info');
    }
    if (playerInvolved) {
      resultTitle = '🤝 同归于尽！';
      resultMsg = `双方武将在 ${battle.toLoc.name} 玉石俱焚！`;
      resultColor = '#ffa500';
    }
  } else {
    if (battle.isPlayerAttacker) gameState.actionPoints -= 1;
    if (playerInvolved) {
      addLog(`🛡️ ${battle.defFaction ? battle.defFaction.name : '中立军'} 守住了 ${battle.toLoc.name}！`, 'info');
    } else {
      addLog(`🛡️ ${battle.defFaction ? battle.defFaction.name : '中立军'} 守住 ${battle.toLoc.name}（击退 ${battle.attFaction.name}）`, 'info');
    }
    if (playerInvolved) {
      if (playerIsAttacker) {
        resultTitle = '😞 进攻失败！';
        resultMsg = `未能攻下 ${battle.toLoc.name}，敌军守备顽强！`;
        resultColor = '#f44336';
      } else {
        resultTitle = '🎉 防守成功！';
        resultMsg = `成功守住 ${battle.toLoc.name}，击退敌军！`;
        resultColor = '#4caf50';
      }
    }
  }

  // 在战斗界面显示结果
  if (playerInvolved && resultTitle) {
    document.getElementById('battle-phase-hint').innerHTML = `<span style="color:${resultColor};font-size:18px;font-weight:bold;">${resultTitle}</span>`;
    document.getElementById('battle-info-text').textContent = resultMsg;
    document.getElementById('battle-actions').innerHTML = `<span style="color:${resultColor};font-size:14px;font-weight:bold;text-align:center;width:100%;">${resultMsg}</span>`;
    document.getElementById('battle-log-area').innerHTML +=
      `<div class="battle-log-entry system" style="font-size:16px;text-align:center;color:${resultColor};font-weight:bold;padding:8px;">${resultTitle} ${resultMsg}</div>`;
  }

  // 动态归属：进攻方离开后原据点可能变中立
  updateLocationOwnership(battle.fromLocId);

  // 延迟关闭战斗界面，让玩家看到结果
  const closeBattle = () => {
    document.getElementById('battle-overlay').classList.remove('active');
    pendingBattleRetreat = null; // 清理撤退模式
    battle = null;
  };

  if (playerInvolved && resultTitle) {
    setTimeout(closeBattle, 2000);
  } else {
    closeBattle();
  }
  updateActionPoints();
  renderMap();
  updateUI();
  updateSidePanel();
  checkVictory();

  // 防守战斗结束后恢复AI执行
  if (gameState._pendingDefense) {
    gameState._pendingDefense = null;
    if (gameState._resumeAI) {
      const resume = gameState._resumeAI;
      setTimeout(resume, 400);
    }
  }
}

function renderBattle() {
  if (!battle) return;

  // 战斗已结束：保持结果展示，不覆盖UI
  if (battle.phase === 'finished') return;

  const tNames = { road: '大道', mountain: '山路', water: '水路' };
  document.getElementById('battle-info-text').textContent =
    `${battle.attFaction.name} ${battle.fromLoc.name} → ${battle.toLoc.name}（${tNames[battle.terrain] || '?'}）`;

  document.getElementById('battle-attacker-title').innerHTML =
    `⚔️ ${battle.attFaction.name} <span style="font-size:12px;color:#aaa;">(${battle.fromLoc.name})</span>`;
  document.getElementById('battle-defender-title').innerHTML =
    `🛡️ ${battle.defFaction ? battle.defFaction.name : '中立'} <span style="font-size:12px;color:#aaa;">(${battle.toLoc.name})</span>`;

  // ===== 行动选择阶段 =====
  if (battle.phase === 'action_choice') {
    const activeName = battle.activeSide === 'attacker' ? battle.attFaction.name : (battle.defFaction ? battle.defFaction.name : '中立');
    document.getElementById('battle-attacker-title').innerHTML =
      `⚔️ ${battle.attFaction.name} <span style="font-size:12px;color:#aaa;">(${battle.fromLoc.name})</span>${battle.activeSide === 'attacker' ? ' <span style="color:#ffd700;font-size:11px;">⚡行动中</span>' : ''}`;
    document.getElementById('battle-defender-title').innerHTML =
      `🛡️ ${battle.defFaction ? battle.defFaction.name : '中立'} <span style="font-size:12px;color:#aaa;">(${battle.toLoc.name})</span>${battle.activeSide === 'defender' ? ' <span style="color:#ffd700;font-size:11px;">⚡行动中</span>' : ''}`;

    // 渲染双方武将概况
    document.getElementById('battle-attacker-cards').innerHTML = battle.attLegions.map((l, i) => {
      const dead = l.troops <= 0 || battle.retreated.attacker.includes(i);
      return `<div class="battle-card${dead ? ' dead' : ''}" style="pointer-events:none;">
        <div class="card-name">⭐ ${l.hero.name}</div>
        <div class="card-troops">${dead ? '💀' : l.troops + ' 人'}</div>
      </div>`;
    }).join('');
    document.getElementById('battle-defender-cards').innerHTML = battle.defLegions.map((l, i) => {
      const dead = l.troops <= 0 || battle.retreated.defender.includes(i);
      return `<div class="battle-card${dead ? ' dead' : ''}" style="pointer-events:none;">
        <div class="card-name">⭐ ${l.hero.name}</div>
        <div class="card-troops">${dead ? '💀' : l.troops + ' 人'}</div>
      </div>`;
    }).join('');

    document.getElementById('battle-phase-hint').textContent = `👉 ${activeName} 的回合：选择行动`;
    document.getElementById('battle-log-area').innerHTML = battle.log.map(l =>
      `<div class="battle-log-entry ${l.type}">${l.msg}</div>`
    ).join('');

    const btnPanel = document.getElementById('battle-actions');
    if (isPlayerActive()) {
      const canFight = getActiveLegions().some((l, i) => l.troops > 0 && !getActiveRetreated().includes(i));
      const canRetreat = getActiveLegions().some((l, i) => l.troops > 0 && !getActiveRetreated().includes(i));
      btnPanel.innerHTML = `
        <button class="confirm" onclick="chooseActionFight()" ${!canFight ? 'disabled' : ''}>⚔️ 出战</button>
        <button class="danger" onclick="chooseActionRetreat()" ${!canRetreat ? 'disabled' : ''}>🏃 撤退</button>
      `;
    } else {
      btnPanel.innerHTML = '<span style="color:#aaa;">AI 思考中...</span>';
      if (!battle._aiActionTimer) {
        battle._aiActionTimer = setTimeout(() => aiChooseAction(), 700);
      }
    }
    return;
  }

  // ===== 阵型选择阶段 =====
  if (battle.phase === 'formation') {
    const duelHeroName = battle.activeSide === 'attacker'
      ? battle.attLegions[battle._lastAttIdx].hero.name
      : battle.defLegions[battle._lastDefIdx].hero.name;
    const enemyName = battle.activeSide === 'attacker'
      ? battle.defLegions[battle._lastDefIdx].hero.name
      : battle.attLegions[battle._lastAttIdx].hero.name;

    // 渲染对战的两位武将卡片
    const attHero = battle.attLegions[battle._lastAttIdx];
    const defHero = battle.defLegions[battle._lastDefIdx];
    document.getElementById('battle-attacker-cards').innerHTML = `
      <div class="battle-card" style="border-color:#ffd700;">
        <div class="card-name">⭐ ${attHero.hero.name} <span style="color:#888;font-size:11px;">战力${attHero.hero.power}</span></div>
        <div class="card-troops">${attHero.troops} 人</div>
      </div>`;
    document.getElementById('battle-defender-cards').innerHTML = `
      <div class="battle-card" style="border-color:#ffd700;">
        <div class="card-name">⭐ ${defHero.hero.name} <span style="color:#888;font-size:11px;">战力${defHero.hero.power}</span></div>
        <div class="card-troops">${defHero.troops} 人</div>
      </div>`;

    document.getElementById('battle-phase-hint').textContent = '🎯 双方选择阵型（同时盲选）';

    // 渲染阵型选择按钮（双方盲选，检查玩家是否参与战斗而非是否主动方）
    const btnPanel = document.getElementById('battle-actions');
    const playerInBattle = battle.attackerId === gameState.factionId || battle.defenderId === gameState.factionId;
    if (playerInBattle && battle.aiFormation) {
      btnPanel.innerHTML = FORMATIONS.map((f, i) => `
        <div class="formation-card" onclick="selectPlayerFormation(${i})">
          <div class="form-icon">${f.icon}</div>
          <div class="form-name">${f.name}</div>
          <div style="font-size:10px;color:#aaa;">${f.desc}</div>
          <div class="form-counter">克 ${FORMATIONS.find(fo => fo.id === f.counters).icon}${FORMATIONS.find(fo => fo.id === f.counters).name}</div>
          <div class="form-counter countered" style="font-size:9px;">被 ${FORMATIONS.find(fo => fo.id === f.counteredBy).icon}${FORMATIONS.find(fo => fo.id === f.counteredBy).name} 克</div>
        </div>
      `).join('');
    } else if (playerInBattle && !battle.aiFormation) {
      btnPanel.innerHTML = '<span style="color:#aaa;">AI 正在选择阵型...</span>';
    } else {
      btnPanel.innerHTML = '<span style="color:#aaa;">双方布阵中...</span>';
    }

    document.getElementById('battle-log-area').innerHTML = battle.log.map(l =>
      `<div class="battle-log-entry ${l.type}">${l.msg}</div>`
    ).join('');
    return;
  }

  // ===== 单挑阶段 =====
  if (battle.phase === 'duel' && battle.currentDuel) {
    const duel = battle.currentDuel;
    const attHero = battle.attLegions[duel.attIdx].hero;
    const defHero = battle.defLegions[duel.defIdx].hero;
    const attPct = Math.round(duel.attTroops / Math.max(duel.attOrigTroops, 1) * 100);
    const defPct = Math.round(duel.defTroops / Math.max(duel.defOrigTroops, 1) * 100);

    document.getElementById('battle-attacker-cards').innerHTML = `
      <div class="battle-card" style="border-color:#ffd700;">
        <div class="card-name">⭐ ${attHero.name} <span style="color:#888;font-size:11px;">战力${attHero.power}</span></div>
        <div style="font-size:13px;color:#ffa500;">${duel.attFormation.icon} ${duel.attFormation.name}</div>
        <div class="card-troops">${duel.attTroops} 人 <span class="bar" style="width:${attPct}%;background:${attPct>50?'#4caf50':attPct>25?'#ff9800':'#f44336'}"></span></div>
        ${duel.round > 0 ? `<div style="font-size:12px;color:#f44336;">↣ 受 ${duel.lastDefDmg} 伤害</div>` : ''}
      </div>`;

    document.getElementById('battle-defender-cards').innerHTML = `
      <div class="battle-card" style="border-color:#ffd700;">
        <div class="card-name">⭐ ${defHero.name} <span style="color:#888;font-size:11px;">战力${defHero.power}</span></div>
        <div style="font-size:13px;color:#ffa500;">${duel.defFormation.icon} ${duel.defFormation.name}</div>
        <div class="card-troops">${duel.defTroops} 人 <span class="bar" style="width:${defPct}%;background:${defPct>50?'#4caf50':defPct>25?'#ff9800':'#f44336'}"></span></div>
        ${duel.round > 0 ? `<div style="font-size:12px;color:#f44336;">↣ 受 ${duel.lastAtkDmg} 伤害</div>` : ''}
      </div>`;

    // 克制提示
    const counterMsg = duel.counterInfo.type === 'counter' ? `🎯 ${duel.attFormation.name}克${duel.defFormation.name}！进攻方伤害+30%`
      : (duel.counterInfo.type === 'countered' ? `⚠️ ${duel.defFormation.name}克${duel.attFormation.name}！防守方优势` : '双方互不克制');

    document.getElementById('battle-phase-hint').textContent = `⚔️ 第 ${duel.round} 回合 | ${counterMsg}`;

    // 按钮
    const btnPanel = document.getElementById('battle-actions');
    if (isPlayerInDuel()) {
      btnPanel.innerHTML = `
        <button class="confirm" onclick="continueDuel()">⚔️ 继续战斗</button>
        <button class="danger" onclick="retreatFromDuel()">🏃 撤退（脱离1v1，仍可继续参战）</button>
        <button style="background:linear-gradient(180deg,#666,#444);border-color:#888;color:#ccc;" onclick="surrenderInDuel()">🏳️ 投降</button>
      `;
    } else {
      btnPanel.innerHTML = '<span style="color:#aaa;">AI 决斗中...</span>';
    }

    document.getElementById('battle-log-area').innerHTML = battle.log.map(l =>
      `<div class="battle-log-entry ${l.type}">${l.msg}</div>`
    ).join('');
    return;
  }

  // ===== 常规阶段（pick / combat_result）=====
  const activeName = battle.activeSide === 'attacker' ? battle.attFaction.name : (battle.defFaction ? battle.defFaction.name : '中立');
  document.getElementById('battle-attacker-title').innerHTML =
    `⚔️ ${battle.attFaction.name} <span style="font-size:12px;color:#aaa;">(${battle.fromLoc.name})</span>${battle.activeSide === 'attacker' ? ' <span style="color:#ffd700;font-size:11px;">⚡主动</span>' : ''}`;
  document.getElementById('battle-defender-title').innerHTML =
    `🛡️ ${battle.defFaction ? battle.defFaction.name : '中立'} <span style="font-size:12px;color:#aaa;">(${battle.toLoc.name})</span>${battle.activeSide === 'defender' ? ' <span style="color:#ffd700;font-size:11px;">⚡主动</span>' : ''}`;

  // 确定谁能在 pick_active / pick_passive 阶段选将
  const playerSide = battle.isPlayerAttacker ? 'attacker' : 'defender';
  const canClickAttacker = (battle.phase === 'pick_active' && isPlayerActive() && playerSide === 'attacker')
    || (battle.phase === 'pick_passive' && !isPlayerActive() && playerSide === 'attacker')
    || (battle.phase === 'pick'); // 旧版兼容
  const canClickDefender = (battle.phase === 'pick_active' && isPlayerActive() && playerSide === 'defender')
    || (battle.phase === 'pick_passive' && !isPlayerActive() && playerSide === 'defender')
    || (battle.phase === 'pick'); // 旧版兼容

  // 渲染进攻方武将列表
  document.getElementById('battle-attacker-cards').innerHTML = battle.attLegions.map((l, i) => {
    let cls = 'battle-card';
    if (l.troops <= 0) cls += ' dead';
    if (battle.retreated.attacker.includes(i)) cls += ' retreated';
    if (battle.selectedAttIdx === i) cls += ' selected';
    // pick_active: 高亮主动方已选的武将
    if (battle.phase === 'pick_active' && battle.activeSide === 'attacker' && battle._activePickedIdx === i) cls += ' selected';
    if (battle.phase === 'pick_passive' && battle.activeSide === 'attacker' && battle._activePickedIdx === i) cls += ' selected locked';
    const pct = Math.round(l.troops / Math.max(l.origTroops, 1) * 100);
    const onClick = canClickAttacker ? `onclick="onBattleCardClick('attacker', ${i})"` : '';
    return `
    <div class="${cls}" id="att-card-${i}">
      <div ${onClick} style="cursor:pointer;">
        <div class="card-name">⭐ ${l.hero.name} <span style="color:#888;font-size:11px;">战力${l.hero.power}</span></div>
        <div class="card-info" title="${l.hero.skill.desc}">${l.hero.skill.desc}</div>
        <div class="card-troops">${l.troops} 人 <span class="bar" style="width:${pct}%;background:${pct>50?'#4caf50':pct>25?'#ff9800':'#f44336'}"></span></div>
      </div>
      ${l.troops <= 0 ? '<div style="color:#f44336;font-size:11px;">💀 已阵亡</div>' : ''}
      ${battle.retreated.attacker.includes(i) ? '<div style="color:#ffa500;font-size:11px;">🏃 已撤退</div>' : ''}
      ${battle.phase === 'pick_passive' && battle.activeSide === 'attacker' && battle._activePickedIdx === i ? '<div style="color:#ffd700;font-size:11px;">🔒 已出战</div>' : ''}
    </div>`;
  }).join('');

  // 渲染防守方武将列表
  document.getElementById('battle-defender-cards').innerHTML = battle.defLegions.map((l, i) => {
    let cls = 'battle-card';
    if (l.troops <= 0) cls += ' dead';
    if (battle.retreated.defender.includes(i)) cls += ' retreated';
    if (battle.selectedDefIdx === i) cls += ' selected';
    // pick_active: 高亮主动方已选的武将
    if (battle.phase === 'pick_active' && battle.activeSide === 'defender' && battle._activePickedIdx === i) cls += ' selected';
    if (battle.phase === 'pick_passive' && battle.activeSide === 'defender' && battle._activePickedIdx === i) cls += ' selected locked';
    const pct = Math.round(l.troops / Math.max(l.origTroops, 1) * 100);
    const onClick = canClickDefender ? `onclick="onBattleCardClick('defender', ${i})"` : '';
    return `
    <div class="${cls}" id="def-card-${i}">
      <div ${onClick} style="cursor:pointer;">
        <div class="card-name">⭐ ${l.hero.name} <span style="color:#888;font-size:11px;">战力${l.hero.power}</span></div>
        <div class="card-info" title="${l.hero.skill.desc}">${l.hero.skill.desc}</div>
        <div class="card-troops">${l.troops} 人 <span class="bar" style="width:${pct}%;background:${pct>50?'#4caf50':pct>25?'#ff9800':'#f44336'}"></span></div>
      </div>
      ${l.troops <= 0 ? '<div style="color:#f44336;font-size:11px;">💀 已阵亡</div>' : ''}
      ${battle.retreated.defender.includes(i) ? '<div style="color:#ffa500;font-size:11px;">🏃 已撤退</div>' : ''}
      ${battle.phase === 'pick_passive' && battle.activeSide === 'defender' && battle._activePickedIdx === i ? '<div style="color:#ffd700;font-size:11px;">🔒 已出战</div>' : ''}
    </div>`;
  }).join('');

  // 阶段提示
  const passiveName = battle.activeSide === 'attacker'
    ? (battle.defFaction ? battle.defFaction.name : '中立')
    : battle.attFaction.name;
  const hints = {
    pick: `👉 ${activeName} 回合：挑选【我方武将 → 对方武将】对战`,
    pick_active: isPlayerActive()
      ? `👉 你（${activeName}）选择出战武将`
      : `👉 ${activeName} 选择出战武将...`,
    pick_passive: !isPlayerActive()
      ? `👉 你（${passiveName}）选择迎战武将`
      : `👉 ${passiveName} 选择迎战武将...`,
    resolving: '⚡ 战斗中...',
    combat_result: battle.lastResult ?
      (battle.lastResult.attackerWon ? '🏆 进攻方本回合胜出！' : '💔 防守方本回合胜出！') : '',
    finished: battle.winner === 'attacker' ? '🏆 进攻方胜利！' : '🛡️ 防守方胜利！',
  };
  document.getElementById('battle-phase-hint').textContent = hints[battle.phase] || '';

  // 按钮状态
  const btnPanel = document.getElementById('battle-actions');
  let btnHtml = '';

  if (battle.phase === 'pick_active') {
    if (isPlayerActive()) {
      const activePick = battle._activePickedIdx;
      btnHtml += `<button class="confirm" id="btn-confirm-active" onclick="confirmActivePick()" ${activePick === null ? 'disabled' : ''}>✅ 出战</button>`;
      if (activePick !== null) {
        btnHtml += `<button class="danger" id="btn-retreat-active" onclick="retreatActiveLegion()">🏃 撤出战役（选相邻据点）</button>`;
      }
    } else {
      btnHtml += '<span style="color:#aaa;">AI 选择出战武将...</span>';
    }
  } else if (battle.phase === 'pick_passive') {
    if (!isPlayerActive()) {
      // 玩家是被动方，选择迎战武将
      const playerSide = battle.isPlayerAttacker ? 'attacker' : 'defender';
      const passivePick = playerSide === 'attacker' ? battle.selectedAttIdx : battle.selectedDefIdx;
      btnHtml += `<button class="confirm" id="btn-confirm-passive" onclick="confirmPassivePick()" ${passivePick === null ? 'disabled' : ''}>✅ 迎战</button>`;
    } else {
      btnHtml += '<span style="color:#aaa;">AI 选择迎战武将...</span>';
    }
  } else if (battle.phase === 'combat_result') {
    btnHtml += '<span style="color:#ffa500;">准备下一轮对决...</span>';
  }

  btnHtml += `<button id="btn-auto-battle" onclick="autoBattle()" ${battle.phase === 'finished' ? 'disabled' : ''}>⚡ 自动战斗</button>`;
  btnHtml += `<button class="danger" id="btn-retreat-all" onclick="retreatAllLegions()" ${battle.phase === 'finished' ? 'disabled' : ''}>🚪 全军撤退</button>`;
  btnPanel.innerHTML = btnHtml;

  // 日志
  document.getElementById('battle-log-area').innerHTML = battle.log.map(l =>
    `<div class="battle-log-entry ${l.type}">${l.msg}</div>`
  ).join('');
}

// 统一的卡片点击处理
function onBattleCardClick(side, idx) {
  if (!battle) return;
  const isAttacker = (side === 'attacker');
  const playerSide = battle.isPlayerAttacker ? 'attacker' : 'defender';

  if (battle.phase === 'pick_active' && isPlayerActive()) {
    // 主动方选将阶段：玩家是主动方，只能选己方武将
    if (side !== playerSide) return;
    const legions = getActiveLegions();
    const retreated = getActiveRetreated();
    const l = legions[idx];
    if (!l || l.troops <= 0 || retreated.includes(idx)) return;
    battle._activePickedIdx = idx;
    renderBattle();
  } else if (battle.phase === 'pick_passive' && !isPlayerActive()) {
    // 被动方迎战阶段：玩家是被动方，只能选己方武将
    if (side !== playerSide) return;
    const legions = getPassiveLegions();
    const retreated = getPassiveRetreated();
    const l = legions[idx];
    if (!l || l.troops <= 0 || retreated.includes(idx)) return;
    // 存储选择到对应字段
    if (playerSide === 'attacker') {
      battle.selectedAttIdx = idx;
      battle.selectedDefIdx = battle._activePickedIdx;
    } else {
      battle.selectedDefIdx = idx;
      battle.selectedAttIdx = battle._activePickedIdx;
    }
    renderBattle();
  }
}

function confirmActivePick() {
  if (!battle || battle.phase !== 'pick_active' || !isPlayerActive()) return;
  if (battle._activePickedIdx === null) return;

  // 玩家（主动方）已选好武将，切换到被动方迎战
  battle.phase = 'pick_passive';
  renderBattle();
  // 如果被动方是 AI，AI 自动迎战
  if (isPlayerActive()) {
    // 被动方是 AI（原来 isPlayerActive 对 pick_passive 判断是 false）
    setTimeout(() => aiPickPassive(), 600);
  }
}

function confirmPassivePick() {
  if (!battle || battle.phase !== 'pick_passive' || isPlayerActive()) return;
  if (battle.selectedAttIdx === null || battle.selectedDefIdx === null) return;

  // 被动方（玩家）已选好迎战武将，进入阵型阶段
  battle._lastAttIdx = battle.selectedAttIdx;
  battle._lastDefIdx = battle.selectedDefIdx;
  battle.selectedAttIdx = null;
  battle.selectedDefIdx = null;
  battle._activePickedIdx = null;
  battle.phase = 'formation';
  battle.playerFormation = null;
  battle.aiFormation = null;

  // AI 立即选阵型（先选再渲染，避免UI卡在等待状态）
  const aiHero = (battle.activeSide === 'attacker' ? battle.attLegions[battle._lastAttIdx] : battle.defLegions[battle._lastDefIdx]).hero;
  battle.aiFormation = aiPickFormation(aiHero);
  renderBattle();
}

function confirmBattlePick() {
  if (!battle || battle.phase !== 'pick' || !isPlayerActive()) return;
  const mySel = getMySelection();
  const enemySel = getEnemySelection();
  if (mySel === null || enemySel === null) return;

  battle._lastAttIdx = battle.activeSide === 'attacker' ? mySel : enemySel;
  battle._lastDefIdx = battle.activeSide === 'attacker' ? enemySel : mySel;

  // 进入阵型选择阶段（不再直接 resolve）
  battle.phase = 'formation';
  battle.playerFormation = null;
  battle.aiFormation = null;

  // AI 立即选阵型（先选再渲染）
  if (!isPlayerActive()) {
    const aiHero = (battle.activeSide === 'attacker' ? battle.attLegions[battle._lastAttIdx] : battle.defLegions[battle._lastDefIdx]).hero;
    battle.aiFormation = aiPickFormation(aiHero);
  }
  renderBattle();
}

// 玩家选择阵型
function selectPlayerFormation(formationIdx) {
  if (!battle || battle.phase !== 'formation') return;
  battle.playerFormation = FORMATIONS[formationIdx];

  // AI 选阵型（如果还没选）
  if (!battle.aiFormation) {
    const aiHero = (battle.activeSide === 'attacker' ? battle.defLegions[battle._lastDefIdx] : battle.attLegions[battle._lastAttIdx]).hero;
    battle.aiFormation = aiPickFormation(aiHero);
  }

  revealFormations();
}

// 揭示阵型并开始单挑
function revealFormations() {
  if (!battle) return;

  // playerFormation = 人类玩家的阵型，aiFormation = AI 的阵型
  const attFormation = battle.isPlayerAttacker ? battle.playerFormation : battle.aiFormation;
  const defFormation = battle.isPlayerAttacker ? battle.aiFormation : battle.playerFormation;

  // 克制判定（攻方阵型 vs 守方阵型）
  const counterInfo = getCounterInfo(attFormation, defFormation);

  battle.currentDuel = {
    attIdx: battle._lastAttIdx,
    defIdx: battle._lastDefIdx,
    attFormation: attFormation,
    defFormation: defFormation,
    attTroops: battle.attLegions[battle._lastAttIdx].troops,
    defTroops: battle.defLegions[battle._lastDefIdx].troops,
    attOrigTroops: battle.attLegions[battle._lastAttIdx].troops,
    defOrigTroops: battle.defLegions[battle._lastDefIdx].troops,
    round: 0,
    counterInfo: counterInfo,
    lastAtkDmg: 0,
    lastDefDmg: 0,
    isPlayerAttackerDuel: battle.isPlayerAttacker,
  };

  battle.phase = 'duel';
  battle.log.push({ msg: `${attFormation.icon} ${battle.attLegions[battle._lastAttIdx].hero.name}(${attFormation.name}) VS ${defFormation.icon} ${battle.defLegions[battle._lastDefIdx].hero.name}(${defFormation.name})`, type: 'system' });
  battle.log.push({ msg: counterInfo.msg, type: counterInfo.type === 'counter' ? 'win' : (counterInfo.type === 'countered' ? 'lose' : 'system') });

  renderBattle();

  // 如果双方都是 AI，自动执行决斗
  const playerNotInBattle = battle.attackerId !== gameState.factionId && battle.defenderId !== gameState.factionId;
  if (playerNotInBattle) {
    setTimeout(() => autoDuel(), 500);
  }
}

// 执行一回合单挑
function executeDuelRound() {
  if (!battle || battle.phase !== 'duel' || !battle.currentDuel) return;

  const duel = battle.currentDuel;
  duel.round++;

  const attHero = battle.attLegions[duel.attIdx].hero;
  const defHero = battle.defLegions[duel.defIdx].hero;
  const isCounter = duel.counterInfo.type === 'counter';
  const isCountered = duel.counterInfo.type === 'countered';

  const result = calculateDuelRound(
    duel.attTroops, attHero, duel.attFormation,
    duel.defTroops, defHero, duel.defFormation,
    battle.terrain, isCounter, isCountered
  );

  duel.attTroops = Math.max(0, duel.attTroops - result.defDamage);
  duel.defTroops = Math.max(0, duel.defTroops - result.atkDamage);

  // 扈三娘红锦：每回合恢复2%兵力
  if (attHero.id === 'husanniang' && duel.attTroops > 0) {
    const heal = Math.floor(duel.attOrigTroops * 0.02);
    duel.attTroops = Math.min(duel.attTroops + heal, duel.attOrigTroops);
  }
  if (defHero.id === 'husanniang' && duel.defTroops > 0) {
    const heal = Math.floor(duel.defOrigTroops * 0.02);
    duel.defTroops = Math.min(duel.defTroops + heal, duel.defOrigTroops);
  }

  duel.lastAtkDmg = result.atkDamage;
  duel.lastDefDmg = result.defDamage;

  // 更新实际军团兵力
  battle.attLegions[duel.attIdx].troops = duel.attTroops;
  battle.defLegions[duel.defIdx].troops = duel.defTroops;

  const attName = attHero.name;
  const defName = defHero.name;

  // 飘伤害数字（在战斗界面中心）
  const overlay = document.getElementById('battle-overlay');
  if (overlay && overlay.classList.contains('active')) {
    const rect = overlay.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    showFloatingDamage(cx - 80, cy - 30, result.atkDamage, false);
    showFloatingDamage(cx + 40, cy + 10, result.defDamage, false);
  }

  battle.log.push({ msg: `⚔️ 第${duel.round}回合：${attName} 造成 ${result.atkDamage} 伤害（余${duel.attTroops}），${defName} 造成 ${result.defDamage} 伤害（余${duel.defTroops}）`, type: 'system' });

  // AI 自动撤退评估（每回合后）
  if (duel.round >= 2 && duel.attTroops > 0 && duel.defTroops > 0) {
    const playerSide = battle.isPlayerAttacker ? 'attacker' : 'defender';
    const aiSide = playerSide === 'attacker' ? 'defender' : 'attacker';
    const aiIdx = aiSide === 'attacker' ? duel.attIdx : duel.defIdx;
    const aiTroops = aiSide === 'attacker' ? duel.attTroops : duel.defTroops;
    const aiOrigTroops = aiSide === 'attacker' ? duel.attOrigTroops : duel.defOrigTroops;
    const playerTroops = aiSide === 'attacker' ? duel.defTroops : duel.attTroops;
    const playerOrigTroops = aiSide === 'attacker' ? duel.defOrigTroops : duel.attOrigTroops;
    const aiPct = aiTroops / Math.max(aiOrigTroops, 1);
    const playerPct = playerTroops / Math.max(playerOrigTroops, 1);

    // AI撤退条件：兵力不足且差距明显
    if (aiPct < 0.35 && playerPct - aiPct > 0.20 && Math.random() < 0.65) {
      const aiFromLoc = aiSide === 'attacker' ? battle.fromLocId : battle.toLocId;
      const aiFactionId = aiSide === 'attacker' ? battle.attackerId : battle.defenderId;
      const aiLegion = aiSide === 'attacker' ? battle.attLegions[aiIdx] : battle.defLegions[aiIdx];
      const retreatOptions = getRetreatDestinations(aiFromLoc, aiFactionId);

      if (retreatOptions.length > 0) {
        // AI撤退（损失兵力，脱离1v1但不离开战役）
        const lossPct = 0.15 + Math.random() * 0.10;
        const loss = Math.max(1, Math.floor(aiLegion.troops * lossPct));
        aiLegion.troops -= loss;
        if (aiLegion.troops < 0) aiLegion.troops = 0;

        battle.log.push({ msg: `🦊 ${aiLegion.hero.name} 不敌，从单挑中撤退！损失 ${loss} 人`, type: 'system' });
        if (aiLegion.troops <= 0) {
          battle.retreated[aiSide].push(aiIdx);
          battle.retreatDest[`${aiSide}_${aiIdx}`] = null;
          battle.log.push({ msg: `💀 ${aiLegion.hero.name} 伤势过重身亡！`, type: 'lose' });
        }
        endCurrentDuel(playerSide === 'attacker' ? 'attacker' : 'defender');
        return;
      } else if (Math.random() < 0.40) {
        // 无路可退 → 概率叛变投降玩家
        const lossPct = 0.10 + Math.random() * 0.10;
        const loss = Math.max(1, Math.floor(aiLegion.troops * lossPct));
        aiLegion.troops -= loss;
        if (aiLegion.troops < 0) aiLegion.troops = 0;

        if (!battle.surrendered) battle.surrendered = { attacker: [], defender: [] };
        battle.surrendered[aiSide].push(aiIdx);
        const playerFaction = FACTIONS.find(f => f.id === gameState.factionId);
        battle.log.push({ msg: `🏳️ ${aiLegion.hero.name} 走投无路，叛变投降${playerFaction.name}！损失 ${loss} 人`, type: 'system' });
        if (aiLegion.troops <= 0) {
          battle.retreated[aiSide].push(aiIdx);
          battle.retreatDest[`${aiSide}_${aiIdx}`] = null;
          battle.log.push({ msg: `💀 ${aiLegion.hero.name} 伤势过重身亡，叛变未遂！`, type: 'lose' });
        }
        endCurrentDuel(playerSide === 'attacker' ? 'attacker' : 'defender');
        return;
      }
    }
  }

  // 检查是否分出胜负
  if (duel.attTroops <= 0 && duel.defTroops <= 0) {
    battle.log.push({ msg: `💀 ${attName} 与 ${defName} 同归于尽！`, type: 'lose' });
    triggerScreenShake();
    endCurrentDuel('draw');
    return;
  } else if (duel.attTroops <= 0) {
    battle.log.push({ msg: `💀 ${attName} 阵亡！${defName} 获胜！`, type: 'lose' });
    triggerScreenShake();
    endCurrentDuel('defender');
    return;
  } else if (duel.defTroops <= 0) {
    battle.log.push({ msg: `💀 ${defName} 阵亡！${attName} 获胜！`, type: 'win' });
    triggerScreenShake();
    endCurrentDuel('attacker');
    return;
  }

  renderBattle();

  // 如果非玩家控制，自动继续
  if (!isPlayerInDuel()) {
    setTimeout(() => autoDuelRound(), 800);
  }
}

// 判断当前单挑中玩家是否参与
function isPlayerInDuel() {
  if (!battle || !battle.currentDuel) return false;
  return battle.attackerId === gameState.factionId || battle.defenderId === gameState.factionId;
}

// 玩家继续单挑
function continueDuel() {
  if (!battle || battle.phase !== 'duel') return;
  executeDuelRound();
}

// 玩家撤退（从单挑中）
// 战斗中撤退（1v1中脱离，损失兵力但留在战役中）
function retreatFromDuel() {
  if (!battle || battle.phase !== 'duel' || !battle.currentDuel) return;

  if (!confirm('确定撤退吗？（损失15-25%兵力，退出本回合单挑但仍可继续参战）')) return;

  const duel = battle.currentDuel;
  const isPlayerAttacker = duel.isPlayerAttackerDuel;

  // 确定撤退方
  const side = isPlayerAttacker ? 'attacker' : 'defender';
  const idx = isPlayerAttacker ? duel.attIdx : duel.defIdx;
  const legion = isPlayerAttacker ? battle.attLegions[idx] : battle.defLegions[idx];

  // 撤退损失（仅损失兵力，不离开战役）
  const lossPct = 0.15 + Math.random() * 0.10;
  const loss = Math.max(1, Math.floor(legion.troops * lossPct));
  legion.troops -= loss;
  if (legion.troops < 0) legion.troops = 0;

  battle.log.push({ msg: `🏃 ${legion.hero.name} 从单挑中撤退！损失 ${loss} 人（${Math.round(lossPct*100)}%），${legion.troops > 0 ? '可继续参战' : '不幸阵亡'}`, type: 'system' });

  // 如果撤退后兵力归零，标记为阵亡
  if (legion.troops <= 0) {
    battle.retreated[side].push(idx);
    battle.retreatDest[`${side}_${idx}`] = null;
    battle.log.push({ msg: `💀 ${legion.hero.name} 伤势过重身亡！`, type: 'lose' });
  }

  // 本场1v1敌方获胜
  endCurrentDuel(isPlayerAttacker ? 'defender' : 'attacker');
}

// 战前撤退（选将阶段，撤出本场战役到相邻据点）
function retreatFromPickPhase(legionIdx) {
  const isPickPhase = battle.phase === 'pick' || battle.phase === 'pick_active' || battle.phase === 'pick_passive';
  if (!battle || !isPickPhase) return;

  // 确定要撤退的武将在哪一侧
  const playerSide = battle.isPlayerAttacker ? 'attacker' : 'defender';
  const legions = playerSide === 'attacker' ? battle.attLegions : battle.defLegions;
  const retreated = playerSide === 'attacker' ? battle.retreated.attacker : battle.retreated.defender;
  const fromLocId = playerSide === 'attacker' ? battle.fromLocId : battle.toLocId;
  const factionId = playerSide === 'attacker' ? battle.attackerId : battle.defenderId;
  const l = legions[legionIdx];
  if (!l || l.troops <= 0 || retreated.includes(legionIdx)) return;

  // 获取可撤退目的地
  const options = getRetreatDestinations(fromLocId, factionId);
  if (options.length === 0) {
    addLog(`⚠️ ${l.hero.name} 没有可撤退的相邻据点！`, 'bad');
    return;
  }

  // 显示撤退目的地选择弹窗
  showRetreatDestPopup(legionIdx, l, playerSide, fromLocId, factionId, options);
}

// 撤退目的地选择弹窗
let pendingRetreatPick = null;

function showRetreatDestPopup(legionIdx, legion, side, fromLocId, factionId, options) {
  pendingRetreatPick = { legionIdx, legion, side, fromLocId, factionId, options };

  let html = '<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:250;display:flex;align-items:center;justify-content:center;">';
  html += '<div style="background:linear-gradient(180deg,#2d1f0e,#1a0f05);border:3px solid #8b6914;border-radius:12px;padding:24px;max-width:420px;width:90%;">';
  html += `<h2 style="color:#ffd700;margin-bottom:8px;">🏃 ${legion.hero.name} 撤退</h2>`;
  html += `<p style="color:#aaa;font-size:13px;margin-bottom:16px;">选择撤退目的地（损失30%兵力，武将撤出本场战役）：</p>`;

  options.forEach((o, i) => {
    const icon = o.type === 'friendly' ? '🟢' : '⚪';
    html += `<button onclick="confirmRetreatPick(${i})" style="width:100%;text-align:left;margin-bottom:6px;padding:10px 14px;background:linear-gradient(180deg,#3a2005,#2a1000);border:2px solid #8b6914;border-radius:6px;color:#ffd700;cursor:pointer;font-size:14px;">
      ${icon} ${o.name} <span style="color:#888;font-size:12px;">${o.type === 'friendly' ? '己方据点' : '无主据点'}</span>
    </button>`;
  });

  html += `<button onclick="cancelRetreatPick()" style="width:100%;margin-top:8px;padding:10px;background:linear-gradient(180deg,#555,#333);border:2px solid #888;border-radius:6px;color:#ccc;cursor:pointer;">✖ 放弃撤退（武将阵亡）</button>`;
  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function confirmRetreatPick(optIdx) {
  if (!pendingRetreatPick || !battle) return;
  const { legionIdx, legion, side, options } = pendingRetreatPick;
  const destLocId = options[optIdx].locationId;

  // 关闭弹窗
  document.querySelectorAll('div[style*="z-index:250"]').forEach(el => el.remove());

  // 撤退损失
  const loss = Math.max(1, Math.floor(legion.troops * 0.30));
  legion.troops -= loss;
  if (legion.troops < 0) legion.troops = 0;

  const retreated = side === 'attacker' ? battle.retreated.attacker : battle.retreated.defender;
  retreated.push(legionIdx);
  battle.retreatDest[`${side}_${legionIdx}`] = destLocId;

  const destName = LOCATIONS.find(l => l.id === destLocId).name;
  battle.log.push({ msg: `🏃 ${legion.hero.name} 撤出战役，退至 ${destName}！损失 ${loss} 人`, type: 'system' });

  pendingRetreatPick = null;

  // 检查胜负
  const attAlive = battle.attLegions.some((l, i) => l.troops > 0 && !battle.retreated.attacker.includes(i));
  const defAlive = battle.defLegions.some((l, i) => l.troops > 0 && !battle.retreated.defender.includes(i));
  if (!attAlive) { endBattle('defender'); return; }
  if (!defAlive) { endBattle('attacker'); return; }

  renderBattle();
}

function cancelRetreatPick() {
  if (!pendingRetreatPick || !battle) return;
  const { legionIdx, legion, side } = pendingRetreatPick;

  // 关闭弹窗
  document.querySelectorAll('div[style*="z-index:250"]').forEach(el => el.remove());

  // 放弃撤退 → 武将阵亡
  legion.troops = 0;
  const retreated = side === 'attacker' ? battle.retreated.attacker : battle.retreated.defender;
  retreated.push(legionIdx);
  battle.retreatDest[`${side}_${legionIdx}`] = null;
  battle.log.push({ msg: `💀 ${legion.hero.name} 放弃撤退，力战而亡！`, type: 'lose' });

  pendingRetreatPick = null;

  // 检查胜负
  const attAlive = battle.attLegions.some((l, i) => l.troops > 0 && !battle.retreated.attacker.includes(i));
  const defAlive = battle.defLegions.some((l, i) => l.troops > 0 && !battle.retreated.defender.includes(i));
  if (!attAlive) { endBattle('defender'); return; }
  if (!defAlive) { endBattle('attacker'); return; }

  renderBattle();
}

// 投降（武将叛变投靠敌方阵营）
function surrenderInDuel() {
  if (!battle || battle.phase !== 'duel' || !battle.currentDuel) return;

  const duel = battle.currentDuel;
  const isPlayerAttacker = duel.isPlayerAttackerDuel;
  const side = isPlayerAttacker ? 'attacker' : 'defender';
