<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>水浒·天下争锋</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background: #1a1a2e; color: #e0d5b7;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
#top-bar {
  background: linear-gradient(180deg, #2d1f0e, #1a0f05);
  padding: 8px 16px; display: flex; justify-content: space-between; align-items: center;
  border-bottom: 2px solid #8b6914; min-height: 48px; flex-shrink: 0;
}
#top-bar h1 { font-size: 20px; color: #ffd700; text-shadow: 2px 2px 4px #000; }
#top-bar .resources { display: flex; gap: 20px; font-size: 14px; flex-wrap: wrap; }
#top-bar .resources span { color: #ffa500; font-weight: bold; }
#top-bar .toggle-btn {
  background: linear-gradient(180deg, #5a3a0a, #3a2005);
  border: 1px solid #8b6914; border-radius: 4px;
  color: #ffd700; cursor: pointer; padding: 4px 12px;
  font-size: 14px; font-family: inherit;
}
#top-bar .toggle-btn:hover { background: linear-gradient(180deg, #7a4a1a, #5a300a); }
#main-area { display: flex; flex: 1; overflow: hidden; }
#map-container {
  flex: 1; min-width: 200px; position: relative;
  background: radial-gradient(ellipse at center, #2a4a2a 0%, #1a2a1a 100%);
}
#map-container canvas { display: block; }
#resize-handle {
  width: 5px; cursor: col-resize; background: #8b6914;
  flex-shrink: 0; transition: background 0.2s;
}
#resize-handle:hover { background: #ffd700; }
#resize-handle.hidden { display: none; }
#side-panel {
  width: 340px; flex-shrink: 0;
  background: linear-gradient(180deg, #2d1f0e, #1a0f05);
  border-left: 2px solid #8b6914; display: flex; flex-direction: column;
  padding: 12px; gap: 10px; overflow-y: auto;
}
#side-panel.collapsed { display: none; }
#side-panel h2 { font-size: 16px; color: #ffd700; border-bottom: 1px solid #8b6914; padding-bottom: 6px; }
#location-info { flex-shrink: 0; }
#location-info .info-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
#location-info .info-row .label { color: #aaa; }
#location-info .info-row .value { color: #fff; font-weight: bold; }
#action-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
#action-buttons button {
  flex: 1; min-width: 70px; padding: 8px 10px;
  border: 1px solid #8b6914; border-radius: 4px;
  background: linear-gradient(180deg, #5a3a0a, #3a2005);
  color: #ffd700; cursor: pointer; font-size: 13px; font-family: inherit;
}
#action-buttons button:hover:not(:disabled) { background: linear-gradient(180deg, #7a4a1a, #5a300a); }
#action-buttons button:disabled { opacity: 0.4; cursor: not-allowed; }
#event-log {
  flex: 1; min-height: 150px; overflow-y: auto;
  background: rgba(0,0,0,0.4); border-radius: 4px; padding: 8px;
  font-size: 12px; line-height: 1.6;
}
#event-log .log-entry { padding: 2px 0; border-bottom: 1px solid rgba(139,105,20,0.2); }
#event-log .log-entry.good { color: #4caf50; }
#event-log .log-entry.bad { color: #f44336; }
#event-log .log-entry.info { color: #90caf9; }
#bottom-bar {
  background: #1a0f05; border-top: 2px solid #8b6914;
  padding: 8px 16px; display: flex; gap: 10px; justify-content: center; flex-shrink: 0;
}
#bottom-bar button {
  padding: 8px 20px; border: 1px solid #8b6914; border-radius: 4px;
  background: linear-gradient(180deg, #5a3a0a, #3a2005);
  color: #ffd700; cursor: pointer; font-size: 14px; font-family: inherit;
}
#bottom-bar button:hover { background: linear-gradient(180deg, #7a4a1a, #5a300a); }
#bottom-bar button.primary { background: linear-gradient(180deg, #8b0000, #5a0000); border-color: #ff4444; }

#faction-select {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.88); display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 100;
}
#faction-select h2 { color: #ffd700; font-size: 28px; margin-bottom: 8px; }
#faction-select .subtitle { color: #aaa; font-size: 14px; margin-bottom: 24px; }
#faction-select .faction-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 720px; padding: 0 16px; }
#faction-select .faction-card {
  background: linear-gradient(180deg, #2d1f0e, #1a0f05);
  border: 2px solid #8b6914; border-radius: 8px;
  padding: 16px; text-align: center; cursor: pointer; transition: transform 0.2s;
}
#faction-select .faction-card:hover { transform: scale(1.06); border-color: #ffd700; }
#faction-select .faction-card h3 { font-size: 18px; margin-bottom: 4px; }
#faction-select .faction-card .difficulty { font-size: 12px; color: #aaa; }
#faction-select .faction-card .cities { font-size: 11px; color: #90caf9; margin-top: 4px; }
#faction-select .faction-card .desc { font-size: 11px; color: #ccc; margin-top: 4px; }

/* 战斗界面 */
#battle-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 200;
  display: none; flex-direction: column;
}
#battle-overlay.active { display: flex; }
#battle-header {
  background: linear-gradient(180deg, #3a1010, #1a0505);
  padding: 12px 20px; text-align: center;
  border-bottom: 2px solid #c0392b; flex-shrink: 0;
}
#battle-header h2 { color: #ff6b6b; font-size: 22px; }
#battle-header .battle-info { color: #ccc; font-size: 13px; margin-top: 4px; }
#battle-main {
  display: flex; flex: 1; overflow: hidden;
}
.battle-side {
  flex: 1; padding: 16px; display: flex; flex-direction: column;
  overflow-y: auto;
}
.battle-side h3 { font-size: 16px; margin-bottom: 10px; text-align: center; }
.battle-side.attacker { background: rgba(46,204,113,0.08); }
.battle-side.defender { background: rgba(231,76,60,0.08); }
.battle-card {
  background: linear-gradient(180deg, #2d1f0e, #1a0f05);
  border: 2px solid #8b6914; border-radius: 6px;
  padding: 10px; margin-bottom: 8px; cursor: pointer;
  transition: all 0.2s;
}
.battle-card:hover:not(.dead):not(.retreated) { border-color: #ffd700; transform: scale(1.02); }
.battle-card.selected { border-color: #00ff88 !important; box-shadow: 0 0 12px rgba(0,255,136,0.3); }
.battle-card.selected.locked { border-color: #ffd700 !important; box-shadow: 0 0 12px rgba(255,215,0,0.3); cursor: default; }
.battle-card.dead { opacity: 0.3; cursor: not-allowed; text-decoration: line-through; }
.battle-card.retreated { opacity: 0.4; cursor: not-allowed; border-style: dashed; }
.battle-card .card-name { font-size: 15px; color: #ffd700; }
.battle-card .card-info { font-size: 12px; color: #aaa; margin-top: 2px; }
.battle-card .card-troops { font-size: 18px; color: #fff; font-weight: bold; margin-top: 4px; }
.battle-card .card-troops .bar {
  display: inline-block; height: 8px; border-radius: 4px;
  background: #4caf50; vertical-align: middle; margin-left: 8px;
}
#battle-log-area {
  height: 150px; overflow-y: auto; background: rgba(0,0,0,0.5);
  border-top: 1px solid #8b6914; padding: 8px 16px;
  font-size: 12px; line-height: 1.5; flex-shrink: 0;
}
#battle-log-area .battle-log-entry { padding: 2px 0; }
#battle-log-area .battle-log-entry.win { color: #4caf50; }
#battle-log-area .battle-log-entry.lose { color: #f44336; }
#battle-log-area .battle-log-entry.system { color: #ffa500; }
#battle-actions {
  padding: 10px 16px; display: flex; gap: 10px; justify-content: center;
  border-top: 1px solid #8b6914; flex-shrink: 0; flex-wrap: wrap;
}
#battle-actions button {
  padding: 10px 24px; border: 1px solid #8b6914; border-radius: 4px;
  background: linear-gradient(180deg, #5a3a0a, #3a2005);
  color: #ffd700; cursor: pointer; font-size: 14px; font-family: inherit;
}
#battle-actions button:hover:not(:disabled) { background: linear-gradient(180deg, #7a4a1a, #5a300a); }
#battle-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
#battle-actions button.danger { background: linear-gradient(180deg, #8b0000, #5a0000); border-color: #ff4444; }
#battle-actions button.confirm { background: linear-gradient(180deg, #006400, #004400); border-color: #4caf50; }
.phase-hint {
  text-align: center; color: #ffa500; font-size: 14px;
  padding: 6px; font-weight: bold;
}

@media (max-width: 768px) {
  #main-area { flex-direction: column; }
  #map-container { height: 50vh; }
  #side-panel { width: 100%; max-height: 40vh; }
  #faction-select .faction-grid { grid-template-columns: repeat(2, 1fr); }
  #top-bar { flex-direction: column; gap: 4px; }
  #top-bar .resources { font-size: 12px; gap: 10px; }
}

/* ===== 动画效果 ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { box-shadow: 0 0 4px rgba(255,215,0,0.3); } 50% { box-shadow: 0 0 16px rgba(255,215,0,0.7); } }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
@keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
@keyframes flashRed { 0%,100% { filter: none; } 50% { filter: brightness(1.8) saturate(0.5); } }
@keyframes glowBorder { 0%,100% { border-color: #ffd700; } 50% { border-color: #fff; box-shadow: 0 0 20px rgba(255,215,0,0.5); } }

.float-damage {
  position: fixed; pointer-events: none; font-weight: bold; font-size: 20px;
  z-index: 300; animation: floatUp 1s ease-out forwards;
  text-shadow: 0 0 8px rgba(0,0,0,0.9);
}
.hp-bar { transition: width 0.5s ease-out; }

/* 阵型卡牌 */
.formation-card {
  background: linear-gradient(180deg, #2d1f0e, #1a0f05);
  border: 2px solid #8b6914; border-radius: 10px;
  padding: 14px 8px; text-align: center; cursor: pointer;
  transition: all 0.2s ease; flex: 1; min-width: 75px;
}
.formation-card:hover {
  transform: translateY(-5px) scale(1.04);
  border-color: #ffd700; box-shadow: 0 8px 28px rgba(255,215,0,0.3);
}
.formation-card .form-icon { font-size: 30px; transition: transform 0.3s; }
.formation-card:hover .form-icon { transform: scale(1.25); }
.formation-card .form-name { font-size: 14px; font-weight: bold; color: #ffd700; margin: 4px 0; }
.formation-card .form-counter { font-size: 10px; color: #ff9800; }
.formation-card .form-counter.countered { color: #f44336; }

/* 日志颜色标签 */
.log-entry { padding: 3px 6px; border-radius: 3px; margin: 1px 0; transition: background 0.3s; }
.log-entry:hover { background: rgba(255,255,255,0.05); }
.log-entry .tag {
  display: inline-block; padding: 1px 6px; border-radius: 3px;
  font-size: 10px; font-weight: bold; margin-right: 4px; vertical-align: middle;
}
.tag-combat { background: #c0392b; color: #fff; }
.tag-event  { background: #8e44ad; color: #fff; }
.tag-recruit{ background: #27ae60; color: #fff; }
.tag-system { background: #2980b9; color: #fff; }
.tag-intel  { background: #f39c12; color: #000; }

/* 顶部资源闪烁 */
#top-bar .resources span { transition: all 0.3s ease; }
#top-bar .resources span.flash { animation: pulse 0.5s ease-out; }

/* 地图悬停提示 */
#map-tooltip {
  position: fixed; pointer-events: none; z-index: 150;
  background: rgba(10,5,0,0.92); border: 1px solid #8b6914;
  border-radius: 6px; padding: 8px 12px; font-size: 12px;
  color: #ffd700; display: none; max-width: 200px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
}
#map-tooltip .tt-name { font-weight: bold; font-size: 14px; }
#map-tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 2px; }
#map-tooltip .tt-row .tt-label { color: #aaa; }
#map-tooltip .tt-row .tt-value { color: #fff; }
</style>
</head>
<body>

<div id="faction-select">
  <h2>🏔️ 选择你的阵营</h2>

</div>

<div id="top-bar">

    <div id="event-log">
      <div class="log-entry info">等待游戏开始...</div>

  </div>
</div>

<div id="bottom-bar">

  <button onclick="saveGame()">💾 存档</button>
  <button onclick="loadGame()">📂 读档</button>

</div>

// 克制关系描述（用于显示）
function getCounterInfo(myFormation, enemyFormation) {
  if (myFormation.counters === enemyFormation.id) return { type: 'counter', msg: `🎯 ${myFormation.name}克${enemyFormation.name}！你获得克制优势，伤害+30%` };
  if (enemyFormation.counters === myFormation.id) return { type: 'countered', msg: `⚠️ ${enemyFormation.name}克${myFormation.name}！敌方获得克制优势` };
  return { type: 'neutral', msg: '双方阵型互不克制，公平对决' };
}

// AI 选择阵型
function aiPickFormation(hero) {
  // 根据武将类型和战力选择阵型
  if (hero.type === 'warrior' && hero.power >= 85) {
    // 猛将偏好锋矢阵
    if (Math.random() < 0.5) return FORMATIONS[1]; // 锋矢
    if (Math.random() < 0.5) return FORMATIONS[2]; // 雁行
    return FORMATIONS[0]; // 方圆
  } else if (hero.type === 'warrior') {
    // 普通武将根据情况
    if (Math.random() < 0.4) return FORMATIONS[3]; // 鱼鳞（灵活）
    if (Math.random() < 0.5) return FORMATIONS[0]; // 方圆（防守）
    return FORMATIONS[1]; // 锋矢
  } else if (hero.type === 'commander') {
    // 统帅偏好雁行（均衡）或方圆（防守）
    if (Math.random() < 0.5) return FORMATIONS[2]; // 雁行
    return FORMATIONS[0]; // 方圆
  } else {
    // 军师偏好鱼鳞（灵活）或雁行
    if (Math.random() < 0.5) return FORMATIONS[3]; // 鱼鳞
    return FORMATIONS[2]; // 雁行
  }
}

// ===== 工具函数 =====
function buildAdjacency() {
  const adj = {};
  LOCATIONS.forEach(l => { adj[l.id] = []; });
  CONNECTIONS.forEach(c => {
    adj[c.from].push({ locationId: c.to, terrain: c.terrain });
    adj[c.to].push({ locationId: c.from, terrain: c.terrain });
  });
  return adj;
}

function getNeighbors(locId) {
  return (adjacency[locId] || []).map(conn => ({
    locationId: conn.locationId,
    terrain: conn.terrain,
  }));
}

// 获取可撤退的目的地（相邻己方据点 + 相邻无主据点）
function getRetreatDestinations(fromLocId, factionId) {
  const neighbors = getNeighbors(fromLocId);
  const results = [];
  neighbors.forEach(n => {
    const effOwner = getEffectiveOwner(n.locationId);
    if (effOwner === factionId) {
      results.push({ locationId: n.locationId, name: LOCATIONS.find(l => l.id === n.locationId).name, type: 'friendly' });
    } else if (!effOwner) {
      results.push({ locationId: n.locationId, name: LOCATIONS.find(l => l.id === n.locationId).name, type: 'neutral' });
    }
  });
  // 优先己方据点，其次无主据点
  results.sort((a, b) => (a.type === 'friendly' ? -1 : 1) - (b.type === 'friendly' ? -1 : 1));
  return results;
}

// 选择撤退目的地（玩家弹窗选择，AI 自动选择）
function selectRetreatDestination(fromLocId, factionId, heroName, isPlayer) {
  const options = getRetreatDestinations(fromLocId, factionId);
  if (options.length === 0) return null; // 无处可退

  if (isPlayer) {
    if (options.length === 1) return options[0].locationId;
    const list = options.map((o, i) => `${i + 1}. ${o.name} ${o.type === 'friendly' ? '🟢己方' : '⚪无主'}`).join('\n');
    const choice = prompt(`${heroName} 撤退到：\n${list}\n输入序号（0=放弃撤退，武将阵亡）：`);
    const idx = parseInt(choice) - 1;
    if (idx >= 0 && idx < options.length) return options[idx].locationId;
    return null; // 0 或无效输入 = 放弃撤退
  } else {
    // AI：优先己方据点
    return options[0].locationId;
  }
}

function getHeroTroopCap(hero) {
  if (!hero) return 500;
  let cap;
  if (hero.type === 'commander') cap = 1200;
  else if (hero.type === 'warrior') cap = 1000;
  else cap = 800;
  // 张浩宇浩宇：兵力上限+300
  if (hero.id === 'zhanghaoyu') cap += 300;
  return cap;
}

function getHeroTerrainAffinity(hero) {
  const waterIds = ['zhangshun', 'ruanxiaoer', 'ruanxiaowu', 'ruanxiaoqi', 'lichun', 'zhangheng'];
  const mountainIds = ['wusong', 'likui', 'luzhishen', 'shijin', 'liutang', 'xiebao', 'xiezhen', 'sunli', 'leizheng'];
  if (waterIds.includes(hero.id)) return 'water';
  if (mountainIds.includes(hero.id)) return 'mountain';
  return 'neutral';
}

// 获取某据点某阵营的总兵力（所有军团兵力之和，无将领=无兵力）
function getTotalTroops(locId, factionId) {
  if (!factionId || !gameState.factions[factionId]) return 0;
  const legions = gameState.factions[factionId].legions.filter(l => l.locationId === locId);
  return legions.reduce((s, l) => s + l.troops, 0);
}
// 获取某据点某阵营的军团列表
function getLegionsAt(locId, factionId) {
  if (!factionId || !gameState.factions[factionId]) return [];
  return gameState.factions[factionId].legions.filter(l => l.locationId === locId);
}
// 获取据点最强守将
function getBestHeroAt(locId, factionId) {
  if (!factionId || !gameState.factions[factionId]) return null;
  const legions = getLegionsAt(locId, factionId);
  return legions.length === 0 ? null : legions.reduce((b, l) => (l.hero.power > b.hero.power ? l : b), legions[0]).hero;
}

// 获取据点实际控制者（无将领驻守 → null）
function getEffectiveOwner(locId) {
  const state = gameState.locations[locId];
  if (!state || !state.owner) return null;
  const legions = gameState.factions[state.owner].legions.filter(l => l.locationId === locId);
  return legions.length > 0 ? state.owner : null;
}

// 更新单个据点归属（无将领 → 变中立）
function updateLocationOwnership(locId) {
  const state = gameState.locations[locId];
  if (!state || !state.owner) return;
  const legions = gameState.factions[state.owner].legions.filter(l => l.locationId === locId);
  if (legions.length === 0) {
    state.owner = null;
    addLog(`🏚️ ${LOCATIONS.find(l => l.id === locId).name} 因无人驻守变为中立！`, 'info');
  }
}

// 更新全部据点归属
function updateAllLocationOwnership() {
  Object.keys(gameState.locations).forEach(locId => updateLocationOwnership(locId));
}

// 侦察系统：检查某据点是否已被侦察（3回合有效）
const SCOUT_DURATION = 3;
function isScouted(locId) {
  if (!gameState.scoutedLocations[locId]) return false;
  return gameState.turn - gameState.scoutedLocations[locId] < SCOUT_DURATION;
}

// 侦察相邻敌方据点
function doScout(fromLocId, targetLocId) {
  if (gameState.actionPoints < 1) { addLog('⚠️ 行动力不足！', 'bad'); return; }
  const targetLoc = LOCATIONS.find(l => l.id === targetLocId);
  const fromLoc = LOCATIONS.find(l => l.id === fromLocId);
  if (!targetLoc || !fromLoc) return;

  gameState.actionPoints -= 1;
  gameState.scoutedLocations[targetLocId] = gameState.turn;
  addLog(`🔭 侦察 ${targetLoc.name}！情报有效 ${SCOUT_DURATION} 回合。`, 'info');
  updateActionPoints();
  updateSidePanel();
}

function addLog(msg, type) {
  if (!gameState) return;
  gameState.logs.push({ msg, type, turn: gameState.turn });
  if (gameState.logs.length > 50) gameState.logs.shift();
  const logEl = document.getElementById('event-log');

  // 自动识别标签类型
  let tag = '';
  let tagClass = '';
  if (msg.includes('⚔️') || msg.includes('💀') || msg.includes('🛡️') || msg.includes('⛓️') || msg.includes('🏳️')) {
    tag = '战斗'; tagClass = 'tag-combat';
  } else if (msg.includes('🎉') || msg.includes('🔍') || msg.includes('🐯') || msg.includes('💰') || msg.includes('🌲') || msg.includes('🍺') || msg.includes('🏚️') || msg.includes('🌊')) {
    tag = '事件'; tagClass = 'tag-event';
  } else if (msg.includes('📋') || msg.includes('🏕️') || msg.includes('📦') || msg.includes('⭐')) {
    tag = '招募'; tagClass = 'tag-recruit';
  } else if (msg.includes('🕵️') || msg.includes('🔭')) {
    tag = '情报'; tagClass = 'tag-intel';
  } else if (msg.includes('📂') || msg.includes('💾') || msg.includes('---') || msg.includes('===') || msg.includes('⚠️')) {
    tag = '系统'; tagClass = 'tag-system';
  }

  const entry = document.createElement('div');
  entry.className = 'log-entry ' + (type || 'info');
  entry.style.animation = 'fadeIn 0.3s ease-out';
  entry.innerHTML = (tag ? `<span class="tag ${tagClass}">${tag}</span>` : '') + msg;
  logEl.appendChild(entry);
  logEl.scrollTop = logEl.scrollHeight;
}

// ===== 道路行军动画 =====
let routeAnimations = []; // { fromX, fromY, toX, toY, color, progress, factionName }
let animFrameId = null;

function addRouteAnimation(fromLocId, toLocId, factionColor, factionName) {
  const fromLoc = LOCATIONS.find(l => l.id === fromLocId);
  const toLoc = LOCATIONS.find(l => l.id === toLocId);
  if (!fromLoc || !toLoc) return;
  routeAnimations.push({
    fromX: fromLoc.x, fromY: fromLoc.y,
    toX: toLoc.x, toY: toLoc.y,
    color: factionColor,
    factionName: factionName,
    progress: 0,
    startTime: Date.now(),
    duration: 600,
  });
  if (!animFrameId) animateRoutes();
}

function animateRoutes() {
  const now = Date.now();
  routeAnimations = routeAnimations.filter(a => now - a.startTime < a.duration + 200);
  routeAnimations.forEach(a => {
    a.progress = Math.min(1, (now - a.startTime) / a.duration);
  });
  renderMap();
  if (routeAnimations.length > 0) {
    animFrameId = requestAnimationFrame(animateRoutes);
  } else {
    animFrameId = null;
  }
}

function initGame(factionId) {
  playerFaction = factionId;
  adjacency = buildAdjacency();
  doubleAttackUsed = false;

  gameState = {
    turn: 1,
    factionId: factionId,
    locations: {},
    factions: {},
    actionPoints: 0,
    maxActionPoints: 0,
    logs: [],
    usedHeroIds: new Set(),
    scoutedLocations: {}, // { locId: turnRevealed } 侦察情报
  };

  // 初始化据点（owner + grain，无 garrison——兵力全在军团里）
  LOCATIONS.forEach(loc => {
    let grain = 0;
    if (loc.owner) {
      if (loc.type === 'capital') { grain = 300; }
      else if (loc.type === 'city') { grain = 200; }
      else { grain = 150; }
    } else {
      // 中立据点：无将领驻守 = 无兵力，只有存粮
      grain = loc.type === 'capital' ? 200 : (loc.type === 'city' ? 150 : 80);
    }
    gameState.locations[loc.id] = { owner: loc.owner, grain };
  });

  // 初始化阵营军团（粮草已归各据点，阵营不再持有总粮草）
  FACTIONS.forEach(f => {
    gameState.factions[f.id] = { legions: [] };

    // 预设将领
    const presets = PRESET_HEROES[f.id] || [];
    presets.forEach(p => {
      const heroData = HERO_POOL.find(h => h.id === p.id);
      if (heroData && !gameState.usedHeroIds.has(p.id)) {
        gameState.usedHeroIds.add(p.id);
        gameState.factions[f.id].legions.push(createLegion(heroData, p.troops, p.loc));
        addLog(`⭐ ${f.name}：${heroData.name} 率领 ${p.troops} 人驻扎 ${LOCATIONS.find(l => l.id === p.loc).name}`, 'info');
      }
    });

    // AI 阵营额外随机补好汉（根据初始据点数调整）
    if (f.id !== factionId) {
      const ownedCount = LOCATIONS.filter(l => l.owner === f.id).length;
      const extraCount = ownedCount >= 4 ? 0 : (ownedCount >= 3 ? 1 : 2); // 地少的阵营多补好汉
      const pool = HERO_POOL.filter(h => !gameState.usedHeroIds.has(h.id));
      for (let i = 0; i < extraCount && pool.length > 0; i++) {
        const idx = Math.floor(Math.random() * pool.length);
        const h = pool[idx];
        const aiLocs = LOCATIONS.filter(l => l.owner === f.id);
        const targetLoc = aiLocs[Math.floor(Math.random() * aiLocs.length)];
        if (targetLoc) {
          const troopCount = h.type === 'commander' ? 500 : (h.type === 'warrior' ? 400 : 300);
          gameState.factions[f.id].legions.push(createLegion(h, troopCount, targetLoc.id));
          gameState.usedHeroIds.add(h.id);
        }
        pool.splice(idx, 1);
      }
    }
  });

  resetActionPoints();
  document.getElementById('faction-select').style.display = 'none';
  resizeCanvas();
  setupMapClick();
  renderMap();
  updateUI();
  updateSidePanel();
  addLog('=== 🏔️ 水浒·天下争锋 ===', 'info');
  addLog(`你选择了 ${FACTIONS.find(f => f.id === factionId).name}，开始逐鹿天下！`, 'good');
}

function renderFactionSelect() {
  const grid = document.getElementById('faction-grid');
  grid.innerHTML = FACTIONS.map(f => {
    const ownedLocs = LOCATIONS.filter(l => l.owner === f.id);
    return `
    <div class="faction-card" onclick="initGame('${f.id}')" style="border-color: ${f.color};">
      <h3 style="color: ${f.color};">${f.name}</h3>
      <div class="difficulty">难度: ${f.difficulty}</div>

// ===== 战斗系统 =====
function calculateCombat(atkTroops, atkHero, defTroops, defHero, terrain, locType, atkFactionId, defFactionId) {
  const terrainCoeff = { road: 1.0, mountain: 0.7, water: 0.6 };
  let coeff = terrainCoeff[terrain] || 1.0;

  // 水军好汉
  if (terrain === 'water' && atkHero) {
    const waterIds = ['zhangshun', 'ruanxiaoer', 'ruanxiaowu', 'ruanxiaoqi', 'lichun'];
    if (waterIds.includes(atkHero.id)) coeff = 1.0;
  }
  // 武松山路
  if (terrain === 'mountain' && atkHero && atkHero.id === 'wusong') coeff = 1.0;

  const defCoeff = (locType === 'capital' || locType === 'city') ? 1.3 : 1.0;

  let atkPower = atkTroops * coeff * (1 + (atkHero ? atkHero.power : 0) / 200);
  let defPower = defTroops * defCoeff * (1 + (defHero ? defHero.power : 0) / 200);

  // 攻击方技能
  if (atkHero) {
    const sn = atkHero.skill.name;
    if (sn === '无双') atkPower *= 1.1;
    if (sn === '神射') defPower *= 0.95;
    if (sn === '智取') defPower *= 0.9;
    if (sn === '道法' && Math.random() < 0.2) defPower = defTroops * defCoeff;
    if (sn === '武圣' && terrain === 'road') atkPower *= 1.15;
    if (sn === '飞石' && Math.random() < 0.2) defPower = defTroops * defCoeff;
    if (sn === '霹雳火') atkPower *= (0.75 + Math.random() * 0.5);
    if (sn === '连环马' && terrain === 'road') defPower = defTroops * defCoeff;
    if (sn === '赤发鬼' && terrain === 'mountain') atkPower *= 1.1;
    if (sn === '拼命三郎' && atkTroops < 300) atkPower *= 1.25;
    if (sn === '两头蛇' && terrain === 'mountain') defPower *= 0.97;
    if (sn === '钩镰枪' && defFactionId === 'liao') atkPower *= 1.20;
    if (sn === '混江龙' && terrain === 'water') defPower = defTroops * defCoeff;
    if (sn === '活阎罗' && terrain === 'water') defPower *= 0.85;
    if (sn === '九纹龙') {
      const owned = Object.values(gameState.locations).filter(l => l.owner === atkFactionId).length;
      atkPower *= (1 + owned * 0.05);
    }
  }

  // 防御方技能
  if (defHero) {
    const sn = defHero.skill.name;
    if (sn === '狂暴') defPower *= 1.3;
    if (sn === '托塔天王') defPower *= 1.2;
  }

  // 随机波动
  const atkFinal = atkPower * (0.85 + Math.random() * 0.3);
  const defFinal = defPower * (0.85 + Math.random() * 0.3);

  const attackerWon = atkFinal > defFinal;
  let attackerLoss, defenderLoss;

  if (attackerWon) {
    attackerLoss = Math.floor(defFinal * 0.3);
    defenderLoss = defTroops;
  } else {
    attackerLoss = Math.floor(defFinal * 0.5);
    defenderLoss = Math.floor(atkFinal * 0.2);
  }

  if (defHero && defHero.skill.name === '金刚') {
    defenderLoss = Math.floor(defenderLoss * 0.8);
  }

  // 招降与投降
  let surrender = null;
  if (attackerWon && defHero) {
    const powerRatio = atkFinal / (defFinal || 1);
    if (powerRatio >= 3.0) {
      const surrenderChance = 0.30 * (1 - (defHero.loyalty || 50) / 200);
      if (Math.random() < surrenderChance) surrender = { type: 'surrender', hero: defHero };
    }
    if (!surrender) {
      const yanqingBonus = (atkHero && atkHero.id === 'yanqing') ? 0.25 : 0;
      const captureChance = 0.25 * (1 - (defHero.loyalty || 50) / 200) + yanqingBonus;
      if (Math.random() < captureChance) surrender = { type: 'capture', hero: defHero };
    }
    if (!surrender && (defHero.loyalty || 50) < 30) {
      if (Math.random() < 0.10) surrender = { type: 'defect', hero: defHero };
    }
  }

  return {
    attackerWon,
    attackerLoss: Math.min(Math.max(1, attackerLoss), atkTroops - 1),
    defenderLoss: Math.min(defenderLoss, defTroops),
    atkFinal: Math.floor(atkFinal),
    defFinal: Math.floor(defFinal),
    surrender,
  };
}

// ===== 多回合单挑伤害计算 =====
function calculateDuelRound(atkTroops, atkHero, atkFormation, defTroops, defHero, defFormation, terrain, isCounter, isCountered) {
  // 基础伤害率
  let atkRate = 0.18 + Math.random() * 0.12; // 18%-30%
  let defRate = 0.18 + Math.random() * 0.12;

  // 战力修正
  atkRate *= (1 + (atkHero.power - 50) / 200);
  defRate *= (1 + (defHero.power - 50) / 200);

  // 阵型攻击修正
  let atkFormMod = 1 + atkFormation.atkMod;
  let defFormMod = 1 + defFormation.atkMod;
  // 被克制方阵型加成减半
  if (isCountered) atkFormMod = 1 + atkFormation.atkMod * 0.5;
  if (isCounter) defFormMod = 1 + defFormation.atkMod * 0.5;

  atkRate *= atkFormMod;
  defRate *= defFormMod;

  // 克制加成
  if (isCounter) atkRate *= 1.30;

  // 地形（仅影响攻击方）
  const terrainMod = { road: 1.0, mountain: 0.7, water: 0.6 };
  atkRate *= (terrainMod[terrain] || 1.0);

  // 水军好汉水路无惩罚
  if (terrain === 'water') {
    const waterIds = ['zhangshun', 'ruanxiaoer', 'ruanxiaowu', 'ruanxiaoqi', 'lichun', 'zhangheng'];
    if (waterIds.includes(atkHero.id)) atkRate /= 0.6; // 恢复
    // 张横船火：水路+15%伤害
    if (atkHero.id === 'zhangheng') atkRate *= 1.15;
  }
  // 武松山路无惩罚
  if (terrain === 'mountain' && atkHero.id === 'wusong') atkRate /= 0.7;

  // 李应飞刀：首回合+10%伤害
  if (atkHero.id === 'liying') atkRate *= 1.10;
  // 石宝劈风：每回合伤害+12%
  if (atkHero.id === 'shibao') atkRate *= 1.12;
  // 庞万春连珠：先手额外造成8%伤害
  if (atkHero.id === 'pangwanchun') atkRate *= 1.08;
  // 穆弘豪杰：每个控制的中立据点+3%伤害
  if (atkHero.id === 'muhong') {
    const neutralOwned = Object.values(gameState.locations).filter(l => l.owner === (battle ? battle.attackerId : null)).length;
    // 简化：直接用atkFaction据点数的1/3作为加成
    atkRate *= 1.05; // 固定5%加成简化
  }

  // 防御方阵型防御修正
  let atkDefMod = 1 - defFormation.defMod;
  let defDefMod = 1 - atkFormation.defMod;
  // 朱仝美髯：守城时敌方攻击-8%
  if (defHero && defHero.id === 'zhutong') atkDefMod += 0.08;
  // 张开铁壁：守城时防御+15%
  if (defHero && defHero.id === 'zhangkai') atkDefMod += 0.15;
  // 邓元觉宝光：守城时免疫阵型克制
  if (defHero && defHero.id === 'dengyuanjue') { isCounter = false; isCountered = false; }
  // 麻昇破阵：单挑中无视敌方阵型克制
  if (atkHero && atkHero.id === 'masheng') { isCounter = false; isCountered = false; }
  // 被克制方阵型加成减半
  if (isCountered) atkDefMod = Math.max(0.3, atkDefMod - defFormation.defMod * 0.5);
  if (isCounter) defDefMod = Math.max(0.3, defDefMod - atkFormation.defMod * 0.5);

  // 随机波动
  atkRate *= (0.7 + Math.random() * 0.6);
  defRate *= (0.7 + Math.random() * 0.6);

  let atkDamage = Math.floor(atkTroops * atkRate * Math.max(0.4, atkDefMod));
  let defDamage = Math.floor(defTroops * defRate * Math.max(0.4, defDefMod));

  // 鱼鳞阵闪避
  if (defFormation.dodge > 0 && Math.random() < defFormation.dodge) {
    atkDamage = Math.floor(atkDamage * 0.5);
  }
  if (atkFormation.dodge > 0 && Math.random() < atkFormation.dodge) {
    defDamage = Math.floor(defDamage * 0.5);
  }

  return {
    atkDamage: Math.max(1, atkDamage),
    defDamage: Math.max(1, defDamage),
  };
}

// ===== 操作函数 =====
let pendingAttackTargets = null; // { fromLocId, targets: [{locationId, terrain, name, info}] }

function showAttackOptions(fromLocId) {
  if (gameState.actionPoints < 1) return;
  const myLegions = getLegionsAt(fromLocId, gameState.factionId);
  if (myLegions.length === 0) { addLog('⚠️ 该据点没有你的军团！请先调动将领过来。', 'bad'); return; }

  const neighbors = getNeighbors(fromLocId);
  const targets = neighbors.filter(n => getEffectiveOwner(n.locationId) !== gameState.factionId);
  if (targets.length === 0) { addLog('没有可进攻的目标。', 'info'); return; }

  // 存储待选目标，在侧边栏渲染按钮
  pendingAttackTargets = {
    fromLocId,
    targets: targets.map(t => {
      const loc = LOCATIONS.find(l => l.id === t.locationId);
      const info = gameState.locations[t.locationId];
      const effOwner = getEffectiveOwner(t.locationId);
      const ownerFaction = effOwner ? FACTIONS.find(f => f.id === effOwner) : null;
      const scouted = isScouted(t.locationId) || !effOwner;
      const defLegions = (effOwner && scouted) ? gameState.factions[effOwner].legions.filter(l => l.locationId === t.locationId) : [];
      return {
        locationId: t.locationId,
        terrain: t.terrain,
        name: loc.name,
        ownerName: ownerFaction ? ownerFaction.name : '中立',
        defHeroes: defLegions.map(l => l.hero.name + '(' + l.troops + '人)').join('、'),
        defTotal: scouted ? defLegions.reduce((s, l) => s + l.troops, 0) : -1,
        scouted,
      };
    }),
  };

  // 始终显示目标列表，让玩家确认（避免误操作）
  renderAttackTargets();
}

function renderAttackTargets() {
  if (!pendingAttackTargets) return;
  const btnPanel = document.getElementById('action-buttons');
  let html = '<div style="font-size:13px;color:#ffa500;margin-bottom:6px;">⚔️ 选择进攻目标：</div>';
  pendingAttackTargets.targets.forEach((t, i) => {
    let defInfo;
    if (!t.scouted) {
      defInfo = ' <span style="color:#f44336;">❓兵力不明</span>';
    } else if (t.defHeroes) {
      defInfo = ` ⭐${t.defHeroes}（${t.defTotal}人）`;
    } else {
      defInfo = ' <span style="color:#888;">无将驻守</span>';
    }
    html += `<button onclick="confirmAttackTarget(${i})" style="width:100%;text-align:left;margin-bottom:4px;">
      ${i + 1}. ${t.name} <span style="color:#888;font-size:11px;">[${t.ownerName}]${defInfo}</span>
    </button>`;
  });
  html += `<button onclick="cancelAttackTargets()" style="width:100%;background:linear-gradient(180deg,#555,#333);border-color:#888;">✖ 取消</button>`;
  btnPanel.innerHTML = html;
}

function confirmAttackTarget(idx) {
  if (!pendingAttackTargets) return;
  const fromLocId = pendingAttackTargets.fromLocId;
  const t = pendingAttackTargets.targets[idx];
  if (!t) { pendingAttackTargets = null; updateSidePanel(); return; }

  // 选择出兵将领
  const myLegions = getLegionsAt(fromLocId, gameState.factionId);
  if (myLegions.length <= 1) {
    // 只有一个将领，直接进攻
    pendingAttackTargets = null;
    doAttack(fromLocId, t.locationId, t.terrain);
  } else {
    // 多个将领，选择派遣哪些
    showLegionSelectionForAttack(fromLocId, t);
  }
}

function cancelAttackTargets() {
  pendingAttackTargets = null;
  updateSidePanel();
}

// 进攻前选择派遣将领
let pendingAttackLegionSelection = null; // { fromLocId, target, selectedIndices: Set }

function showLegionSelectionForAttack(fromLocId, target) {
  const myLegions = getLegionsAt(fromLocId, gameState.factionId);
  pendingAttackLegionSelection = {
    fromLocId,
    target,
    selectedIndices: new Set(myLegions.map((l, i) => i)), // 默认全选
  };
  renderLegionSelection();
}

function renderLegionSelection() {
  if (!pendingAttackLegionSelection) return;
  const { fromLocId, selectedIndices } = pendingAttackLegionSelection;
  const myLegions = getLegionsAt(fromLocId, gameState.factionId);
  const target = pendingAttackLegionSelection.target;
  const btnPanel = document.getElementById('action-buttons');
  let html = `<div style="font-size:13px;color:#ffa500;margin-bottom:6px;">⚔️ 进攻 ${target.name} — 选择出征将领：</div>`;
  myLegions.forEach((l, i) => {
    const checked = selectedIndices.has(i) ? 'checked' : '';
    html += `<label style="display:block;padding:6px 8px;margin-bottom:3px;background:rgba(0,0,0,0.3);border-radius:4px;cursor:pointer;font-size:13px;">
      <input type="checkbox" ${checked} onchange="toggleLegionForAttack(${i})" style="margin-right:8px;">
      ⭐${l.hero.name} <span style="color:#888;">战力${l.hero.power}</span> — ${l.troops} 人
    </label>`;
  });
  if (selectedIndices.size === 0) {
    html += '<div style="color:#f44336;font-size:12px;margin:8px 0;">⚠ 请至少选择一位将领</div>';
  }
  html += `<button onclick="confirmLegionSelection()" ${selectedIndices.size === 0 ? 'disabled' : ''} style="width:100%;background:linear-gradient(180deg,#006400,#004400);border-color:#4caf50;margin-top:8px;">✅ 确认出兵（${selectedIndices.size}将）</button>`;
  html += `<button onclick="cancelLegionSelection()" style="width:100%;background:linear-gradient(180deg,#555,#333);border-color:#888;margin-top:4px;">✖ 取消</button>`;
  btnPanel.innerHTML = html;
}

function toggleLegionForAttack(idx) {
  if (!pendingAttackLegionSelection) return;
  const sel = pendingAttackLegionSelection.selectedIndices;
  if (sel.has(idx)) sel.delete(idx); else sel.add(idx);
  renderLegionSelection();
}

function confirmLegionSelection() {
  if (!pendingAttackLegionSelection) return;
  const { fromLocId, target, selectedIndices } = pendingAttackLegionSelection;
  if (selectedIndices.size === 0) return;
  pendingAttackLegionSelection = null;
  pendingAttackTargets = null;
  doAttackWithLegions(fromLocId, target.locationId, target.terrain, [...selectedIndices]);
}

function cancelLegionSelection() {
  pendingAttackLegionSelection = null;
  pendingAttackTargets = null;
  updateSidePanel();
}

// 侦察邻接敌方据点
let pendingScoutTargets = null;

function showScoutOptions(fromLocId) {
  if (gameState.actionPoints < 1) { addLog('⚠️ 行动力不足！', 'bad'); return; }
  const neighbors = getNeighbors(fromLocId);
  const targets = neighbors.filter(n => {
    const nEff = getEffectiveOwner(n.locationId);
    return nEff && nEff !== gameState.factionId && !isScouted(n.locationId);
  });
  if (targets.length === 0) { addLog('没有可侦察的目标（相邻敌方据点均已侦察）。', 'info'); return; }

  if (targets.length === 1) {
    doScout(fromLocId, targets[0].locationId);
    return;
  }

  pendingScoutTargets = { fromLocId, targets: targets.map(t => {
    const loc = LOCATIONS.find(l => l.id === t.locationId);
    return { locationId: t.locationId, name: loc.name };
  })};
  renderScoutTargets();
}

function renderScoutTargets() {
  if (!pendingScoutTargets) return;
  const btnPanel = document.getElementById('action-buttons');
  let html = '<div style="font-size:13px;color:#ffa500;margin-bottom:6px;">🔭 选择侦察目标（消耗1行动力）：</div>';
  pendingScoutTargets.targets.forEach((t, i) => {
    html += `<button onclick="confirmScoutTarget(${i})" style="width:100%;text-align:left;margin-bottom:4px;">
      ${i + 1}. ${t.name}
    </button>`;
  });
  html += `<button onclick="cancelScoutTargets()" style="width:100%;background:linear-gradient(180deg,#555,#333);border-color:#888;">✖ 取消</button>`;
  btnPanel.innerHTML = html;
}

function confirmScoutTarget(idx) {
  if (!pendingScoutTargets) return;
  const fromLocId = pendingScoutTargets.fromLocId;
  const t = pendingScoutTargets.targets[idx];
  pendingScoutTargets = null;
  if (!t) { updateSidePanel(); return; }
  doScout(fromLocId, t.locationId);
}

function cancelScoutTargets() {
  pendingScoutTargets = null;
  updateSidePanel();
}

// ===== 征兵系统 =====
const RECRUIT_RATE = 5; // 1粮草 = 5兵力
let pendingRecruitLoc = null;
let pendingRecruitSelection = null; // { locId, selectedIndices: Set }

function showRecruitUI(locId) {
  if (gameState.actionPoints < 1) { addLog('⚠️ 行动力不足！', 'bad'); return; }
  const myLegions = getLegionsAt(locId, gameState.factionId);
  if (myLegions.length === 0) { addLog('⚠️ 该据点没有你的军团！', 'bad'); return; }

  // 检查是否有将领需要补兵
  const needsRecruit = myLegions.filter(l => l.troops < getHeroTroopCap(l.hero));
  if (needsRecruit.length === 0) { addLog('📋 所有将领兵力已满，无需征兵。', 'info'); return; }

  pendingRecruitLoc = locId;
  pendingRecruitSelection = { locId, selectedIndices: new Set(myLegions.map((l, i) => i)) };
  renderRecruitUI();
}

function renderRecruitUI() {
  if (!pendingRecruitSelection) return;
  const myLegions = getLegionsAt(pendingRecruitSelection.locId, gameState.factionId);
  const { selectedIndices } = pendingRecruitSelection;
  const btnPanel = document.getElementById('action-buttons');
  const locGrain = (gameState.locations[pendingRecruitSelection.locId].grain || 0);

  let totalNeed = 0;
  const rows = myLegions.map((l, i) => {
    const cap = getHeroTroopCap(l.hero);
    const need = cap - l.troops;
    const checked = selectedIndices.has(i) && need > 0;
    if (checked) totalNeed += need;
    const grainCost = Math.ceil(need / RECRUIT_RATE);
    return `<label style="display:block;padding:6px 8px;margin-bottom:3px;background:rgba(0,0,0,0.3);border-radius:4px;cursor:pointer;font-size:13px;${need <= 0 ? 'opacity:0.4;' : ''}">
      <input type="checkbox" ${checked ? 'checked' : ''} ${need <= 0 ? 'disabled' : ''} onchange="toggleRecruitLegion(${i})" style="margin-right:8px;">
      ⭐${l.hero.name} <span style="color:#888;">${l.troops}/${cap}人</span>
      ${need > 0 ? `<span style="color:#ff9800;"> → +${need}兵（需${grainCost}粮）</span>` : '<span style="color:#4caf50;">已满</span>'}
    </label>`;
  }).join('');

  const totalGrainCost = Math.ceil(totalNeed / RECRUIT_RATE);
  const canAfford = locGrain >= totalGrainCost;

  let html = `<div style="font-size:13px;color:#ffa500;margin-bottom:6px;">📋 征兵（1粮草=${RECRUIT_RATE}兵，默认征满）</div>`;
  html += `<div style="font-size:12px;color:#aaa;margin-bottom:8px;">本地粮草：🌾 ${locGrain} | 共需粮草：${totalGrainCost}</div>`;
  html += rows;
  if (selectedIndices.size === 0 || totalNeed === 0) {
    html += '<div style="color:#888;font-size:12px;margin:8px 0;">请选择需要补兵的将领</div>';
  }
  html += `<button onclick="confirmRecruit()" ${!canAfford || totalNeed === 0 ? 'disabled' : ''} style="width:100%;background:linear-gradient(180deg,#006400,#004400);border-color:#4caf50;margin-top:8px;">
    ✅ 确认征兵（消耗${totalGrainCost}粮草，补充${totalNeed}兵）
  </button>`;
  if (!canAfford && totalNeed > 0) {
    html += '<div style="color:#f44336;font-size:12px;margin:4px 0;">⚠ 粮草不足！</div>';
  }
  html += `<button onclick="cancelRecruit()" style="width:100%;background:linear-gradient(180deg,#555,#333);border-color:#888;margin-top:4px;">✖ 取消</button>`;
  btnPanel.innerHTML = html;
}

function toggleRecruitLegion(idx) {
  if (!pendingRecruitSelection) return;
  const sel = pendingRecruitSelection.selectedIndices;
  if (sel.has(idx)) sel.delete(idx); else sel.add(idx);
  renderRecruitUI();
}

function confirmRecruit() {
  if (!pendingRecruitSelection) return;
  const locId = pendingRecruitSelection.locId;
  const myLegions = getLegionsAt(locId, gameState.factionId);
  const { selectedIndices } = pendingRecruitSelection;
  const locGrain = gameState.locations[locId].grain || 0;

  let totalNeed = 0;
  const recruits = [];
  selectedIndices.forEach(i => {
    const l = myLegions[i];
    if (!l) return;
    const cap = getHeroTroopCap(l.hero);
    const need = cap - l.troops;
    if (need > 0) {
      totalNeed += need;
      recruits.push({ legion: l, need });
    }
  });

  const totalGrainCost = Math.ceil(totalNeed / RECRUIT_RATE);
  if (totalGrainCost > locGrain) {
    addLog('⚠️ 本地粮草不足，征兵失败！', 'bad');
    cancelRecruit();
    return;
  }

  gameState.locations[locId].grain -= totalGrainCost;
  gameState.actionPoints -= 1;
  recruits.forEach(r => {
    r.legion.troops = Math.min(r.legion.troops + r.need, getHeroTroopCap(r.legion.hero));
  });
  addLog(`📋 征兵完成：${recruits.length}将补充 ${totalNeed} 兵，消耗 ${totalGrainCost} 粮草、1行动力。`, 'good');

  pendingRecruitSelection = null;
  pendingRecruitLoc = null;
  updateActionPoints();
  updateUI();
  updateSidePanel();
}

function cancelRecruit() {
  pendingRecruitSelection = null;
  pendingRecruitLoc = null;
  updateSidePanel();
}

// doAttack → 启动战斗界面（见回合制战斗系统区域）

// ===== 调动军团 =====
// ===== 运输系统（调动将领 + 转运粮草）=====
let pendingTransport = null; // { fromLocId, selectedIndices: Set, grainAmount: 0, targets }

function showTransport(locId) {
  const myLegions = getLegionsAt(locId, gameState.factionId);
  if (myLegions.length === 0) { addLog('该据点没有可运输的军团。', 'info'); return; }

  const neighbors = getNeighbors(locId);
  const targets = neighbors.filter(n => {
    const eff = getEffectiveOwner(n.locationId);
    return eff === gameState.factionId || eff === null;
  });
  if (targets.length === 0) { addLog('没有相邻的己方或中立据点。', 'info'); return; }

  pendingTransport = {
    fromLocId: locId,
    selectedIndices: new Set(myLegions.map((l, i) => i)),
    grainAmount: 0,
    targets: targets.map(t => ({ locationId: t.locationId, name: LOCATIONS.find(l => l.id === t.locationId).name })),
  };
  renderTransportLegionSelect();
}

function renderTransportLegionSelect() {
  if (!pendingTransport) return;
  const myLegions = getLegionsAt(pendingTransport.fromLocId, gameState.factionId);
  const { selectedIndices, grainAmount } = pendingTransport;
  const locGrain = gameState.locations[pendingTransport.fromLocId].grain || 0;
  const btnPanel = document.getElementById('action-buttons');

  let html = '<div style="font-size:13px;color:#ffa500;margin-bottom:6px;">📦 运输 — 第1步：选择将领和粮草</div>';
  html += `<div style="font-size:12px;color:#aaa;margin-bottom:8px;">本地粮草：🌾 ${locGrain}</div>`;

  myLegions.forEach((l, i) => {
    const checked = selectedIndices.has(i);
    html += `<label style="display:block;padding:5px 8px;margin-bottom:2px;background:rgba(0,0,0,0.3);border-radius:4px;cursor:pointer;font-size:13px;">
      <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleTransportLegion(${i})" style="margin-right:8px;">
      ⭐${l.hero.name} — ${l.troops} 人（战力${l.hero.power}）
    </label>`;
  });

  html += `<div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
    <span style="font-size:13px;">转运粮草：</span>
    <input type="number" id="transport-grain-input" value="${grainAmount}" min="0" max="${locGrain}"
      onchange="setTransportGrain(this.value)" style="width:80px;background:#1a1a2e;color:#ffd700;border:1px solid #8b6914;padding:4px;border-radius:4px;">
    <span style="font-size:12px;color:#aaa;">/ ${locGrain}</span>
  </div>`;

  if (selectedIndices.size === 0) {
    html += '<div style="color:#f44336;font-size:12px;margin:4px 0;">⚠ 请至少选择一位将领</div>';
  }
  html += `<button onclick="renderTransportTargetSelect()" ${selectedIndices.size === 0 ? 'disabled' : ''} style="width:100%;background:linear-gradient(180deg,#006400,#004400);border-color:#4caf50;margin-top:8px;">
    ✅ 下一步：选择目的地
  </button>`;
  html += `<button onclick="cancelTransport()" style="width:100%;background:linear-gradient(180deg,#555,#333);border-color:#888;margin-top:4px;">✖ 取消</button>`;
  btnPanel.innerHTML = html;
}

function toggleTransportLegion(idx) {
  if (!pendingTransport) return;
  const sel = pendingTransport.selectedIndices;
  if (sel.has(idx)) sel.delete(idx); else sel.add(idx);
  renderTransportLegionSelect();
}

function setTransportGrain(val) {
  if (!pendingTransport) return;
  const maxGrain = gameState.locations[pendingTransport.fromLocId].grain || 0;
  pendingTransport.grainAmount = Math.max(0, Math.min(parseInt(val) || 0, maxGrain));
}

function renderTransportTargetSelect() {
  if (!pendingTransport) return;
  const { targets, selectedIndices, grainAmount } = pendingTransport;
  const myLegions = getLegionsAt(pendingTransport.fromLocId, gameState.factionId);
  const selectedNames = [...selectedIndices].map(i => myLegions[i].hero.name).join('、');
  const btnPanel = document.getElementById('action-buttons');

  let html = '<div style="font-size:13px;color:#ffa500;margin-bottom:6px;">📦 运输 — 第2步：选择目的地</div>';
  html += `<div style="font-size:12px;color:#ccc;margin-bottom:8px;">运输：${selectedNames} ${grainAmount > 0 ? '+ 🌾' + grainAmount + '粮草' : ''}</div>`;

  targets.forEach((t, i) => {
    html += `<button onclick="confirmTransport(${i})" style="width:100%;text-align:left;margin-bottom:4px;">
      📍 ${t.name}
    </button>`;
  });
  html += `<button onclick="renderTransportLegionSelect()" style="width:100%;background:linear-gradient(180deg,#555,#333);border-color:#888;margin-top:4px;">↩ 返回修改</button>`;
  html += `<button onclick="cancelTransport()" style="width:100%;background:linear-gradient(180deg,#555,#333);border-color:#888;margin-top:2px;">✖ 取消</button>`;
  btnPanel.innerHTML = html;
}

function confirmTransport(targetIdx) {
  if (!pendingTransport) return;
  if (gameState.actionPoints < 1) return;
  const { fromLocId, selectedIndices, grainAmount, targets } = pendingTransport;
  const t = targets[targetIdx];
  if (!t) return;

  const myLegions = getLegionsAt(fromLocId, gameState.factionId);
  const toLocId = t.locationId;
  const fromName = LOCATIONS.find(l => l.id === fromLocId).name;
  const toName = LOCATIONS.find(l => l.id === toLocId).name;

  // 转移将领
  const movedNames = [];
  [...selectedIndices].sort((a, b) => b - a).forEach(i => {
    const legion = myLegions[i];
    if (legion) {
      legion.locationId = toLocId;
      movedNames.push(legion.hero.name);
    }
  });

  // 转移粮草
  let grainMsg = '';
  if (grainAmount > 0) {
    gameState.locations[fromLocId].grain -= grainAmount;
    gameState.locations[toLocId].grain = (gameState.locations[toLocId].grain || 0) + grainAmount;
    grainMsg = ` + 🌾${grainAmount}粮草`;
  }

  gameState.actionPoints -= 1;
  if (myLegions.some(l => l.hero.id === 'daizong' && [...selectedIndices].includes(myLegions.indexOf(l)))) {
    gameState.actionPoints += 1;
    addLog('⚡ 戴宗「神行」：运输不消耗行动力！', 'good');
  }

  // 动态归属
  updateLocationOwnership(fromLocId);
  if (!gameState.locations[toLocId].owner) {
    gameState.locations[toLocId].owner = gameState.factionId;
  }

  pendingTransport = null;
  updateActionPoints();
  renderMap();
  updateUI();
  updateSidePanel();
  addLog(`📦 ${movedNames.join('、')} 从 ${fromName} 运往 ${toName}${grainMsg}。`, 'info');
}

function cancelTransport() {
  pendingTransport = null;
  updateSidePanel();
}

function doRest(locId) {
  if (gameState.actionPoints < 1) return;
  const myLegions = getLegionsAt(locId, gameState.factionId);
  if (myLegions.length === 0) { addLog('该据点没有军团可以休整。', 'info'); return; }

  const loc = LOCATIONS.find(l => l.id === locId);
  if (myLegions.length === 1) {
    restLegion(myLegions[0], loc);
  } else {
    // 多将领时在面板选择
    showRestLegionSelection(locId);
  }
}

// 休整将领选择面板
let pendingRestSelection = null; // { locId }

function showRestLegionSelection(locId) {
  const myLegions = getLegionsAt(locId, gameState.factionId);
  const loc = LOCATIONS.find(l => l.id === locId);

      <span style="color:#4caf50;font-size:11px;">(+${healAmount} → ${afterHeal})</span>
    </button>`;

function getRestHealAmount(legion, loc) {
  let heal = Math.floor(loc.baseGrain * 1.5);
  if (legion.hero.id === 'linchong') heal = Math.floor(heal * 1.5);
  if (legion.hero.id === 'wangjin') heal = Math.floor(heal * 1.6);
  return heal;
}

function confirmRestLegion(idx) {
  if (!pendingRestSelection) return;
  const locId = pendingRestSelection.locId;
  const myLegions = getLegionsAt(locId, gameState.factionId);
  const loc = LOCATIONS.find(l => l.id === locId);
  if (idx >= 0 && idx < myLegions.length) {
    restLegion(myLegions[idx], loc);
  }
  pendingRestSelection = null;
}

function cancelRestSelection() {
  pendingRestSelection = null;
  updateSidePanel();
}

function restLegion(legion, loc) {
  let heal = Math.floor(loc.baseGrain * 1.5);
  if (legion.hero.id === 'linchong') heal = Math.floor(heal * 1.5);
  if (legion.hero.id === 'wangjin') heal = Math.floor(heal * 1.6);
  const cap = getHeroTroopCap(legion.hero);
  legion.troops = Math.min(legion.troops + heal, cap);
  gameState.actionPoints -= 1;
  updateActionPoints();
  renderMap();
  updateUI();
  updateSidePanel();
  addLog(`🏕️ ${legion.hero.name} 在 ${loc.name} 休整，回复 ${heal} 兵力。（当前 ${legion.troops}）`, 'info');
}

// ===== 巡视系统 =====
function doPatrol(locId) {
  if (gameState.actionPoints < 1) return;
  const cost = 20;
  if ((gameState.locations[locId].grain || 0) < cost) {
    addLog('⚠️ 本地粮草不足，无法巡视！', 'bad'); return;
  }

  const myLegions = getLegionsAt(locId, gameState.factionId);
  if (myLegions.length === 0) { addLog('⚠️ 该据点没有你的军团，无法巡视！', 'bad'); return; }

  const loc = LOCATIONS.find(l => l.id === locId);
  gameState.locations[locId].grain -= cost;
  gameState.actionPoints -= 1;

  const zhuwuBonus = myLegions.some(l => l.hero.id === 'zhuwu') ? 0.05 : 0;
  const jiashihanBonus = myLegions.some(l => l.hero.id === 'jiashihan') ? 0.05 : 0;
  const heroFindBonus = zhuwuBonus + jiashihanBonus;
  const roll = Math.random();
  const hasEvent = loc.event !== null;

  // 检查是否有相邻敌方据点（情报用）
  const neighbors = getNeighbors(locId);
  const hasAdjEnemy = neighbors.some(n => {
    const nEff = getEffectiveOwner(n.locationId);
    return nEff && nEff !== gameState.factionId;
  });

  if (hasEvent && roll < 0.20) {
    triggerLocationEvent(locId, loc.event);
  } else if (roll < 0.28 + heroFindBonus) {
    recruitHero(locId);
  } else if (roll < 0.46 + heroFindBonus) {
    const amount = 50 + Math.floor(Math.random() * 100);
    if (myLegions.length > 0) {
      const rl = myLegions[Math.floor(Math.random() * myLegions.length)];
      rl.troops = Math.min(rl.troops + amount, getHeroTroopCap(rl.hero));
    }
    addLog(`👥 巡视 ${loc.name}：发现流民，+${amount} 兵！`, 'good');
  } else if (roll < 0.53 + heroFindBonus) {
    const gift = 100 + Math.floor(Math.random() * 150);
    gameState.locations[locId].grain = (gameState.locations[locId].grain || 0) + gift;
    addLog(`🎁 巡视 ${loc.name}：当地富绅仰慕义军，献上 ${gift} 粮草！`, 'good');
  } else if (roll < 0.60 + heroFindBonus) {
    if (Math.random() < 0.5) {
      const loss = 40 + Math.floor(Math.random() * 60);
      if (myLegions.length > 0) {
        myLegions[0].troops = Math.max(0, myLegions[0].troops - loss);
      }
      addLog(`🔫 巡视 ${loc.name}：遭遇流寇打劫！损失 ${loss} 兵力！`, 'bad');
    } else {
      const lossGrain = 50 + Math.floor(Math.random() * 120);
      const oldGrain = gameState.locations[locId].grain || 0;
      gameState.locations[locId].grain = Math.max(0, oldGrain - lossGrain);
      addLog(`🔫 巡视 ${loc.name}：遭遇流寇打劫！被抢走 ${Math.min(lossGrain, oldGrain)} 粮草！`, 'bad');
    }
  } else if (hasAdjEnemy && roll < 0.75 + heroFindBonus) {
    revealIntel(locId);
  } else if (roll < 0.97) {
    addLog(`🔍 巡视 ${loc.name}：平安无事。`, 'info');
  } else {
    const loss = 20 + Math.floor(Math.random() * 40);
    if (myLegions.length > 0) {
      myLegions[0].troops = Math.max(0, myLegions[0].troops - loss);
    }
    addLog(`💥 巡视 ${loc.name}：遭遇伏击！损失 ${loss} 兵力！`, 'bad');
  }

  updateActionPoints();
  renderMap();
  updateUI();
  updateSidePanel();
}

function recruitHero(locId) {
  const loc = LOCATIONS.find(l => l.id === locId);
  const neighbors = getNeighbors(locId);
  const hasWater = neighbors.some(n => n.terrain === 'water');
  const hasMountain = neighbors.some(n => n.terrain === 'mountain');

  // 🥚 隐藏彩蛋：特定地点有概率遇到特殊武将
  const hiddenHeroes = HERO_POOL.filter(h => h.hidden && !gameState.usedHeroIds.has(h.id) && h.hintLoc === locId);
  if (hiddenHeroes.length > 0 && Math.random() < 0.08) {
    const hero = hiddenHeroes[0];
    const typeNames = { commander: '统帅', warrior: '武将', strategist: '军师' };
    const recruitTroops = hero.type === 'commander' ? 400 : (hero.type === 'warrior' ? 350 : 300);
    gameState.factions[gameState.factionId].legions.push(createLegion(hero, recruitTroops, locId));
    gameState.usedHeroIds.add(hero.id);
    // 特殊彩蛋消息
    const eggMsgs = {
      jiashihan: `✨ 巡视 ${loc.name}，忽闻江畔有人吟诗：「他日若遂凌云志，敢笑黄巢不丈夫！」——原来是贾诗涵游历至此，被你的气概折服，率 ${recruitTroops} 人欣然加入！`,
      zhanghaoyu: `✨ 巡视 ${loc.name}，见一人立于山巅，指点江山：「此地聚义，可容天下豪杰！」——张浩宇胸怀大志，率 ${recruitTroops} 人慕名来投！`,
      zhangyongxu: `✨ 巡视 ${loc.name}，晨光熹微中见一将策马而来：「旭日正升，恰是建功之时！」——张永旭闻你威名，率 ${recruitTroops} 人赶来会合！`,
      masheng: `✨ 巡视 ${loc.name}，见一人持枪立于城下，声如洪钟：「听闻此处英雄辈出，某麻昇特来一会！」——言罢翻身上马，率 ${recruitTroops} 人加入麾下！`,
    };
    addLog(eggMsgs[hero.id] || `✨ 偶遇神秘武将 ${hero.name}！（${typeNames[hero.type]}，战力 ${hero.power}）`, 'good');
    updateActionPoints();
    renderMap();
    updateUI();
    updateSidePanel();
    return;
  }

  // 📍 据点专属武将：按据点等级概率出本地武将
  const locHeroes = LOCATION_HEROES[locId] || [];
  const availableLocHeroes = locHeroes.filter(hid => !gameState.usedHeroIds.has(hid));
  const localChance = loc.type === 'capital' ? 0.40 : (loc.type === 'city' ? 0.30 : 0.20);
  if (availableLocHeroes.length > 0 && Math.random() < localChance) {
    const heroId = availableLocHeroes[Math.floor(Math.random() * availableLocHeroes.length)];
    const hero = HERO_POOL.find(h => h.id === heroId);
    if (hero) {
      const recruitCost = 40;
      if ((gameState.locations[locId].grain || 0) >= recruitCost) {
        gameState.locations[locId].grain -= recruitCost;
        const recruitTroops = hero.type === 'commander' ? 350 : (hero.type === 'warrior' ? 300 : 250);
        gameState.factions[gameState.factionId].legions.push(createLegion(hero, recruitTroops, locId));
        gameState.usedHeroIds.add(hero.id);
        const typeNames = { commander: '统帅', warrior: '武将', strategist: '军师' };
        addLog(`📍 巡视 ${loc.name}：此地素有「${hero.name}」的传闻，终于寻得！（${typeNames[hero.type]}，战力 ${hero.power}，率 ${recruitTroops} 人）花费 ${recruitCost} 粮草招入麾下！`, 'good');
        updateActionPoints();
        renderMap();
        updateUI();
        updateSidePanel();
        return;
      }
    }
  }

  let pool = HERO_POOL.filter(h => !gameState.usedHeroIds.has(h.id) && !h.hidden);
  if (pool.length === 0) { addLog(`🔍 巡视 ${loc.name}：天下好汉皆已有主。`, 'info'); return; }

  if (hasWater && Math.random() < 0.5) {
    const wp = pool.filter(h => getHeroTerrainAffinity(h) === 'water');
    if (wp.length > 0) pool = wp;
  } else if (hasMountain && Math.random() < 0.5) {
    const mp = pool.filter(h => getHeroTerrainAffinity(h) === 'mountain');
    if (mp.length > 0) pool = mp;
  }

  const hero = pool[Math.floor(Math.random() * pool.length)];
  const hasChaijin = gameState.factions[gameState.factionId].legions.some(l => l.hero.id === 'chaijin');
  const recruitCost = hasChaijin ? 25 : 50;
  const typeNames = { commander: '统帅', warrior: '武将', strategist: '军师' };

  if ((gameState.locations[locId].grain || 0) >= recruitCost) {
    gameState.locations[locId].grain -= recruitCost;
    const recruitTroops = hero.type === 'commander' ? 300 : (hero.type === 'warrior' ? 250 : 200);
    gameState.factions[gameState.factionId].legions.push(createLegion(hero, recruitTroops, locId));
    gameState.usedHeroIds.add(hero.id);
    addLog(`🎉 巡视 ${loc.name}：偶遇好汉【${hero.name}】！（${typeNames[hero.type]}，战力 ${hero.power}，率 ${recruitTroops} 人）花费 ${recruitCost} 粮草招入麾下！`, 'good');
  } else {
    addLog(`🔍 巡视 ${loc.name}：偶遇好汉【${hero.name}】，但粮草不足！（需要 ${recruitCost}）`, 'bad');
  }
}

function revealIntel(locId) {
  const neighbors = getNeighbors(locId);
  let revealed = [];
  neighbors.forEach(n => {
    const ns = gameState.locations[n.locationId];
    if (ns.owner && ns.owner !== gameState.factionId) {
      const totalTroops = getTotalTroops(n.locationId, ns.owner);
      const enemyLegions = gameState.factions[ns.owner].legions.filter(l => l.locationId === n.locationId);
      const hasXiezhen = enemyLegions.some(l => l.hero.id === 'xiezhen');
      const hasYangzhi = enemyLegions.some(l => l.hero.id === 'yangzhi');
      const locName = LOCATIONS.find(l => l.id === n.locationId).name;

      if (hasXiezhen) {
        revealed.push(`${locName}(兵力被封锁)`);
      } else if (hasYangzhi) {
        revealed.push(`${locName}(情报被封锁)`);
      } else {
        let detail = `${locName}：${totalTroops}兵`;
        if (enemyLegions.length > 0) {
          detail += ` | ${enemyLegions.map(l => l.hero.name + '(' + l.troops + '兵)').join('、')}`;
        } else {
          detail += ' | 无将驻守';
        }
        revealed.push(detail);
      }
      // 侦察标记：3回合有效
      gameState.scoutedLocations[n.locationId] = gameState.turn;
    }
  });
  if (revealed.length > 0) {
    addLog(`🕵️ 巡视情报（相邻敌方）：${revealed.join('；')}`, 'info');
  }
}

        }
        addLog(`🏚️ 十字坡！中了蒙汗药，损失 ${loss} 兵力...`, 'bad');

        gameState.usedHeroIds.add(ruan.id);
        addLog(`🌊 石碣村！${ruan.name} 率 300 水军来投！（战力 ${ruan.power}）`, 'good');

        gameState.locations[locId].grain = (gameState.locations[locId].grain || 0) + 150;

      }
      break;
    case 'xunyang':
      const wp = HERO_POOL.filter(h => getHeroTerrainAffinity(h) === 'water' && !gameState.usedHeroIds.has(h.id));
      if (wp.length > 0 && Math.random() < 0.6) {
        const wh = wp[Math.floor(Math.random() * wp.length)];

      break;
