  const idx = isPlayerAttacker ? duel.attIdx : duel.defIdx;
  const legion = isPlayerAttacker ? battle.attLegions[idx] : battle.defLegions[idx];
  const enemyFaction = isPlayerAttacker ? battle.defFaction : battle.attFaction;
  const enemyFactionId = isPlayerAttacker ? battle.defenderId : battle.attackerId;

  if (!enemyFactionId) {
    addLog('⚠️ 对方没有阵营，无法投降！', 'bad');
    return;
  }

  if (!confirm(`确定让 ${legion.hero.name} 投降${enemyFaction ? enemyFaction.name : '对方'}吗？\n\n⚠️ 武将将叛变投靠敌方阵营！`)) return;

  // 标记叛变（在 endBattle 中处理阵营转移）
  if (!battle.surrendered) battle.surrendered = { attacker: [], defender: [] };
  battle.surrendered[side].push(idx);

  // 损失兵力
  const loss = Math.max(1, Math.floor(legion.troops * 0.15));
  legion.troops -= loss;
  if (legion.troops < 0) legion.troops = 0;

  const enemyName = enemyFaction ? enemyFaction.name : '中立军';
  battle.log.push({ msg: `🏳️ ${legion.hero.name} 叛变投降了${enemyName}！损失 ${loss} 人`, type: 'system' });

  if (legion.troops <= 0) {
    battle.retreated[side].push(idx);
    battle.retreatDest[`${side}_${idx}`] = null;
    battle.log.push({ msg: `💀 ${legion.hero.name} 伤势过重身亡，叛变未遂！`, type: 'lose' });
  }

  endCurrentDuel(isPlayerAttacker ? 'defender' : 'attacker');
}

// 结束当前单挑
function endCurrentDuel(winner) {
  if (!battle || !battle.currentDuel) return;
  const duel = battle.currentDuel;

  // 败方武将处理：如果阵亡(troops=0)且未撤退，标记为阵亡
  if (winner === 'attacker') {
    // 进攻方赢，防守方武将可能阵亡
    if (duel.defTroops <= 0 && !battle.retreated.defender.includes(duel.defIdx)) {
      battle.retreated.defender.push(duel.defIdx);
      battle.retreatDest[`defender_${duel.defIdx}`] = null; // 阵亡
    }
    // 更新防守方军团兵力
    battle.defLegions[duel.defIdx].troops = Math.max(0, duel.defTroops);
    battle.attLegions[duel.attIdx].troops = Math.max(0, duel.attTroops);
  } else if (winner === 'defender') {
    if (duel.attTroops <= 0 && !battle.retreated.attacker.includes(duel.attIdx)) {
      battle.retreated.attacker.push(duel.attIdx);
      battle.retreatDest[`attacker_${duel.attIdx}`] = null;
    }
    battle.attLegions[duel.attIdx].troops = Math.max(0, duel.attTroops);
    battle.defLegions[duel.defIdx].troops = Math.max(0, duel.defTroops);
  } else {
    // draw
    battle.attLegions[duel.attIdx].troops = 0;
    battle.defLegions[duel.defIdx].troops = 0;
    battle.retreated.attacker.push(duel.attIdx);
    battle.retreated.defender.push(duel.defIdx);
    battle.retreatDest[`attacker_${duel.attIdx}`] = null;
    battle.retreatDest[`defender_${duel.defIdx}`] = null;
  }

  battle.currentDuel = null;

  // 检查整体胜负
  const attAlive = battle.attLegions.some((l, i) => l.troops > 0 && !battle.retreated.attacker.includes(i));
  const defAlive = battle.defLegions.some((l, i) => l.troops > 0 && !battle.retreated.defender.includes(i));

  if (!attAlive && !defAlive) { endBattle('draw'); return; }
  if (!attAlive) { endBattle('defender'); return; }
  if (!defAlive) { endBattle('attacker'); return; }

  // 进入 combat_result 阶段，准备下一对武将
  battle.phase = 'combat_result';
  battle.lastResult = { attackerWon: winner === 'attacker' };
  battleResultTimer = null;
  clearSelections();
  renderBattle();

  // 如果败方是玩家控制，需要手动操作
  if ((winner !== 'attacker' && battle.isPlayerAttacker) || (winner === 'attacker' && !battle.isPlayerAttacker)) {
    // 等玩家手动撤退（如果还有存活的）
    // 或者自动继续
  }
  setTimeout(() => continueAfterResult(), 1200);
}

// AI 自动执行单挑所有回合
function autoDuel() {
  if (!battle || battle.phase !== 'duel' || !battle.currentDuel) return;
  if (isPlayerInDuel()) return; // 不该到这里

  executeDuelRound();
}

function autoDuelRound() {
  if (!battle || battle.phase !== 'duel' || !battle.currentDuel) return;
  if (isPlayerInDuel()) return;

  // AI 评估是否撤退
  const duel = battle.currentDuel;
  const isAttacker = battle.isPlayerAttacker ? false : (battle.activeSide === 'attacker');
  const myTroops = isAttacker ? duel.attTroops : duel.defTroops;
  const enemyTroops = isAttacker ? duel.defTroops : duel.attTroops;
  const myOrig = isAttacker ? duel.attOrigTroops : duel.defOrigTroops;
  const myPct = myTroops / Math.max(myOrig, 1);
  const enemyPct = enemyTroops / Math.max(isAttacker ? duel.defOrigTroops : duel.attOrigTroops, 1);

  if (enemyPct - myPct > 0.30 && Math.random() < 0.70) {
    // AI 撤退
    const side = isAttacker ? 'attacker' : 'defender';
    const idx = isAttacker ? duel.attIdx : duel.defIdx;
    const legion = isAttacker ? battle.attLegions[idx] : battle.defLegions[idx];
    const factionId = isAttacker ? battle.attackerId : battle.defenderId;
    const fromLocId = isAttacker ? battle.fromLocId : battle.toLocId;
    const lossPct = 0.15 + Math.random() * 0.10;
    legion.troops -= Math.max(1, Math.floor(legion.troops * lossPct));
    if (legion.troops < 0) legion.troops = 0;

    const destLocId = selectRetreatDestination(fromLocId, factionId, legion.hero.name, false);
    if (destLocId) {
      battle.retreatDest[`${side}_${idx}`] = destLocId;
      battle.log.push({ msg: `🏃 AI：${legion.hero.name} 见势不妙撤退！`, type: 'system' });
    } else {
      battle.retreatDest[`${side}_${idx}`] = null;
      battle.log.push({ msg: `💀 AI：${legion.hero.name} 无处可退！`, type: 'lose' });
      legion.troops = 0;
    }
    battle.retreated[side].push(idx);
    endCurrentDuel(isAttacker ? 'defender' : 'attacker');
  } else if (myPct < 0.30 && Math.random() < 0.50) {
    // AI 兵力太少，赌一把撤退
    const side = isAttacker ? 'attacker' : 'defender';
    const idx = isAttacker ? duel.attIdx : duel.defIdx;
    const legion = isAttacker ? battle.attLegions[idx] : battle.defLegions[idx];
    legion.troops -= Math.max(1, Math.floor(legion.troops * 0.20));
    if (legion.troops < 0) legion.troops = 0;
    const factionId = isAttacker ? battle.attackerId : battle.defenderId;
    const fromLocId = isAttacker ? battle.fromLocId : battle.toLocId;
    const destLocId = selectRetreatDestination(fromLocId, factionId, legion.hero.name, false);
    battle.retreatDest[`${side}_${idx}`] = destLocId;
    battle.retreated[side].push(idx);
    battle.log.push({ msg: `🏃 AI：${legion.hero.name} 兵力不足撤退！`, type: 'system' });
    endCurrentDuel(isAttacker ? 'defender' : 'attacker');
  } else {
    executeDuelRound();
  }
}

function resolveRound() {
  if (!battle) return;
  battle.phase = 'resolving';
  renderBattle();

  const attIdx = battle._lastAttIdx;
  const defIdx = battle._lastDefIdx;
  const attLegion = battle.attLegions[attIdx];
  const defTroops = battle.defLegions[defIdx].troops;
  const defHero = battle.defLegions[defIdx].hero;

  const locType = battle.toLoc.type;
  const result = calculateCombat(
    attLegion.troops, attLegion.hero, defTroops, defHero,
    battle.terrain, locType, battle.attackerId, battle.defenderId
  );

  // 更新兵力
  attLegion.troops -= result.attackerLoss;
  if (attLegion.troops < 0) attLegion.troops = 0;

  const defLegion = battle.defLegions[defIdx];
  defLegion.troops -= result.defenderLoss;
  if (defLegion.troops < 0) defLegion.troops = 0;

  const defName = defLegion.hero.name;
  if (result.attackerWon) {
    battle.log.push({ msg: `⚔️ ${attLegion.hero.name}（余${attLegion.troops}人）击败 ${defName}！`, type: 'win' });
  } else {
    battle.log.push({ msg: `⚔️ ${attLegion.hero.name}（余${attLegion.troops}人）不敌 ${defName}...`, type: 'lose' });
  }

  // 招降
  if (result.surrender) {
    battle.log.push({ msg: `🏳️ ${result.surrender.hero.name} 投降！`, type: 'system' });
    battle.retreated.defender.push(defIdx);
  }

  // 检查胜负
  const attAlive = battle.attLegions.some((l, i) => l.troops > 0 && !battle.retreated.attacker.includes(i));
  const defAlive = battle.defLegions.some((l, i) => l.troops > 0 && !battle.retreated.defender.includes(i));

  if (!attAlive) { endBattle('defender'); return; }
  if (!defAlive) { endBattle('attacker'); return; }

  // 进入战后撤退阶段
  battle.lastResult = result;
  battle.phase = 'combat_result';
  battleResultTimer = null;
  renderBattle();

  // 如果败方武将已阵亡或不需要撤退选择，自动继续
  const loserSide = result.attackerWon ? 'defender' : 'attacker';
  const loserIdx = loserSide === 'attacker' ? attIdx : defIdx;
  const loserRetreated = loserSide === 'attacker' ? battle.retreated.attacker.includes(loserIdx) : battle.retreated.defender.includes(loserIdx);
  const loserLegion = loserSide === 'attacker' ? battle.attLegions[loserIdx] : battle.defLegions[loserIdx];
  const loserIsPlayer = (loserSide === 'attacker') === battle.isPlayerAttacker;

  if (!loserIsPlayer || !loserLegion || loserLegion.troops <= 0 || loserRetreated) {
    // AI 控制或无需选择 → 自动继续
    if (loserLegion && loserLegion.troops <= 0) {
      battle.log.push({ msg: `💀 ${loserLegion.hero.name} 阵亡！`, type: 'lose' });
    }
    battleResultTimer = setTimeout(() => continueAfterResult(), 1500);
  } else {
    // 等玩家选择是否撤退
    battleResultTimer = setTimeout(() => continueAfterResult(), 5000); // 5秒超时自动继续
  }
}

// ===== 行动选择 =====
function chooseActionFight() {
  if (!battle || battle.phase !== 'action_choice' || !isPlayerActive()) return;
  if (battle._aiActionTimer) { clearTimeout(battle._aiActionTimer); battle._aiActionTimer = null; }
  battle.phase = 'pick_active';
  battle._activePickedIdx = null;
  renderBattle();
}

function chooseActionRetreat() {
  if (!battle || battle.phase !== 'action_choice' || !isPlayerActive()) return;
  if (battle._aiActionTimer) { clearTimeout(battle._aiActionTimer); battle._aiActionTimer = null; }
  // 显示撤退武将选择界面
  showRetreatHeroSelect();
}

function aiChooseAction() {
  if (!battle || battle.phase !== 'action_choice' || isPlayerActive()) return;
  battle._aiActionTimer = null;

  const myLegions = getActiveLegions();
  const myRetreated = getActiveRetreated();
  const alive = myLegions.filter((l, i) => l.troops > 0 && !myRetreated.includes(i));

  if (alive.length === 0) {
    // 全部无法行动 → 只能撤退
    aiDoRetreat();
    return;
  }

  // AI决策：80%出战，20%撤退（劣势时撤退概率更高）
  const playerSide = battle.isPlayerAttacker ? 'attacker' : 'defender';
  const enemySide = playerSide === 'attacker' ? 'defender' : 'attacker';
  const enemyLegions = enemySide === 'attacker' ? battle.attLegions : battle.defLegions;
  const enemyRetreated = enemySide === 'attacker' ? battle.retreated.attacker : battle.retreated.defender;
  const enemyAlive = enemyLegions.filter((l, i) => l.troops > 0 && !enemyRetreated.includes(i));

  if (enemyAlive.length === 0) {
    aiDoRetreat(); // 敌方全灭，撤退收尾
    return;
  }

  // 评估战力
  const myPower = alive.reduce((s, l) => s + l.troops * (1 + l.hero.power / 200), 0);
  const enemyPower = enemyAlive.reduce((s, l) => s + l.troops * (1 + l.hero.power / 200), 0);
  const retreatChance = myPower < enemyPower * 0.5 ? 0.5 : (myPower < enemyPower ? 0.25 : 0.10);

  if (Math.random() < retreatChance) {
    aiDoRetreat();
  } else {
    // AI出战
    battle.phase = 'pick_active';
    battle._activePickedIdx = null;
    renderBattle();
    setTimeout(() => aiPickActive(), 600);
  }
}

function aiDoRetreat() {
  if (!battle) return;
  const myLegions = getActiveLegions();
  const myRetreated = getActiveRetreated();
  const aliveIdxs = myLegions.map((l, i) => ({ l, i })).filter(x => x.l.troops > 0 && !myRetreated.includes(x.i)).map(x => x.i);

  if (aliveIdxs.length === 0) {
    // 全部不能撤 → 继续出战
    battle.phase = 'pick_active';
    battle._activePickedIdx = null;
    renderBattle();
    setTimeout(() => aiPickActive(), 600);
    return;
  }

  // AI自动选择撤退目的地
  const aiSide = battle.activeSide;
  const fromLocId = aiSide === 'attacker' ? battle.fromLocId : battle.toLocId;
  const factionId = aiSide === 'attacker' ? battle.attackerId : battle.defenderId;
  const options = getRetreatDestinations(fromLocId, factionId);

  if (options.length === 0) {
    // 无路可退，只能出战
    battle.phase = 'pick_active';
    battle._activePickedIdx = null;
    renderBattle();
    setTimeout(() => aiPickActive(), 600);
    return;
  }

  const destLocId = options[0].locationId; // AI选第一个可退据点

  // 撤退所有存活武将
  aliveIdxs.forEach(idx => {
    const legion = myLegions[idx];
    const loss = Math.max(1, Math.floor(legion.troops * 0.30));
    legion.troops = Math.max(1, legion.troops - loss); // 至少保留1兵
    getActiveRetreated().push(idx);
    battle.retreatDest[`${aiSide}_${idx}`] = destLocId;
    // 如果撤退到无主据点，立即占领
    if (!gameState.locations[destLocId].owner) {
      gameState.locations[destLocId].owner = factionId;
    }
    const destName = LOCATIONS.find(loc => loc.id === destLocId).name;
    battle.log.push({ msg: `🏃 ${legion.hero.name} 撤出战役至 ${destName}！（损失${loss}人）`, type: 'system' });
  });

  // 检查胜负
  const attAlive = battle.attLegions.some((l, i) => l.troops > 0 && !battle.retreated.attacker.includes(i));
  const defAlive = battle.defLegions.some((l, i) => l.troops > 0 && !battle.retreated.defender.includes(i));
  if (!attAlive) { endBattle('defender'); return; }
  if (!defAlive) { endBattle('attacker'); return; }

  // 切换行动方
  battle.activeSide = (battle.activeSide === 'attacker') ? 'defender' : 'attacker';
  battle.phase = 'action_choice';
  battle._activePickedIdx = null;
  battle._aiActionTimer = null;
  renderBattle();
  if (!isPlayerActive()) {
    battle._aiActionTimer = setTimeout(() => aiChooseAction(), 700);
  }
}

function continueAfterResult() {
  if (!battle || battle.phase !== 'combat_result') return;
  if (battleResultTimer) { clearTimeout(battleResultTimer); battleResultTimer = null; }

  clearSelections();
  // 切换主动方（防守方变为主动方）
  battle.activeSide = (battle.activeSide === 'attacker') ? 'defender' : 'attacker';
  battle.round++;
  battle.lastResult = null;
  battle._activePickedIdx = null;
  battle._aiActionTimer = null;
  battle.phase = 'action_choice';
  renderBattle();

  if (!isPlayerActive()) {
    battle._aiActionTimer = setTimeout(() => aiChooseAction(), 700);
  }
}

// 战后撤退（败方操作）
function retreatAfterCombat() {
  if (!battle || battle.phase !== 'combat_result') return;
  const loserSide = battle.lastResult.attackerWon ? 'defender' : 'attacker';
  const loserIdx = loserSide === 'attacker' ? battle._lastAttIdx : battle._lastDefIdx;
  if (loserIdx === null) return;

  const loserLegion = loserSide === 'attacker' ? battle.attLegions[loserIdx] : battle.defLegions[loserIdx];
  if (!loserLegion || loserLegion.troops <= 0) return;

  const loserIsPlayer = (loserSide === 'attacker') === battle.isPlayerAttacker;
  const fromLocId = loserSide === 'attacker' ? battle.fromLocId : battle.toLocId;
  const factionId = loserSide === 'attacker' ? battle.attackerId : battle.defenderId;

  // 选择撤退目的地
  const destLocId = selectRetreatDestination(fromLocId, factionId, loserLegion.hero.name, loserIsPlayer);

  if (destLocId === null) {
    // 无处可退或放弃撤退 → 武将阵亡
    loserLegion.troops = 0;
    if (loserSide === 'attacker') {
      battle.retreated.attacker.push(loserIdx);
    } else {
      battle.retreated.defender.push(loserIdx);
    }
    battle.retreatDest[`${loserSide}_${loserIdx}`] = null;
    battle.log.push({ msg: `💀 ${loserLegion.hero.name} 无处可退，力战而亡！`, type: 'lose' });
  } else {
    const lossPct = Math.random() * 0.30;
    const loss = Math.max(1, Math.floor(loserLegion.troops * lossPct));
    loserLegion.troops -= loss;
    if (loserSide === 'attacker') {
      battle.retreated.attacker.push(loserIdx);
    } else {
      battle.retreated.defender.push(loserIdx);
    }
    battle.retreatDest[`${loserSide}_${loserIdx}`] = destLocId;
    const destName = LOCATIONS.find(loc => loc.id === destLocId).name;
    battle.log.push({ msg: `🏃 ${loserLegion.hero.name} 见势不妙撤退至 ${destName}！损失 ${loss} 人（${Math.round(lossPct*100)}%）`, type: 'system' });
  }

  // 检查胜负
  const attAlive = battle.attLegions.some((l, i) => l.troops > 0 && !battle.retreated.attacker.includes(i));
  const defAlive = battle.defLegions.some((l, i) => l.troops > 0 && !battle.retreated.defender.includes(i));
  if (!attAlive) { endBattle('defender'); return; }
  if (!defAlive) { endBattle('attacker'); return; }

  continueAfterResult();
}

// 战前撤退（主动方在 pick 阶段撤退自己的武将）
// pick_active 阶段撤退已选武将（使用新弹窗）
function retreatActiveLegion() {
  if (!battle || battle.phase !== 'pick_active' || !isPlayerActive()) return;
  if (battle._activePickedIdx === null) return;
  retreatFromPickPhase(battle._activePickedIdx);
}

// 统一的撤退按钮处理（底部栏按钮，选将阶段使用新弹窗）
function retreatSelectedLegion() {
  if (!battle) return;
  const isPickPhase = battle.phase === 'pick' || battle.phase === 'pick_active' || battle.phase === 'pick_passive';
  if (!isPickPhase || !isPlayerActive()) return;
  const mySel = getMySelection();
  if (mySel === null) return;
  retreatFromPickPhase(mySel);
}

// ===== AI 系统（战斗内）=====

// AI 评估一个对战组合的期望
function aiEvaluateMatch(myIdx, enemyIdx, myLegions, enemyLegions) {
  const myLegion = myLegions[myIdx];
  const enemyTroops = enemyLegions[enemyIdx].troops;
  const enemyHero = enemyLegions[enemyIdx].hero;
  // 简化战力估算
  const myPower = myLegion.troops * (1 + myLegion.hero.power / 200);
  const enemyPower = enemyTroops * (1 + (enemyHero ? enemyHero.power : 0) / 200);
  const winProb = myPower / (myPower + enemyPower);
  return {
    myIdx, enemyIdx,
    score: winProb * 2 - 1, // -1到1，正数利于我方
    winProb,
  };
}

// AI 主动方选将：选择己方出战的武将
function aiPickActive() {
  if (!battle || battle.phase !== 'pick_active' || isPlayerActive()) return;

  const myLegions = getActiveLegions();
  const myRetreated = getActiveRetreated();

  const myAlive = myLegions.map((l, i) => ({ l, i })).filter(x => x.l.troops > 0 && !myRetreated.includes(x.i));

  if (myAlive.length === 0) {
    endBattle(battle.activeSide === 'attacker' ? 'defender' : 'attacker');
    return;
  }

  // 取最强的武将出战
  const best = myAlive.reduce((a, b) => a.l.hero.power > b.l.hero.power ? a : b, myAlive[0]);
  battle._activePickedIdx = best.i;

  // 切换到被动方迎战
  battle.phase = 'pick_passive';
  renderBattle();

  // 如果被动方也是 AI，AI 自动迎战
  if (isPlayerActive()) {
    // 被动方是 AI
    setTimeout(() => aiPickPassive(), 600);
  }
  // 否则等待玩家选择迎战武将
}

// AI 被动方迎战：选择己方迎战武将
function aiPickPassive() {
  if (!battle || battle.phase !== 'pick_passive' || !isPlayerActive()) return;

  const enemyLegions = getPassiveLegions(); // 被动方是 AI，所以 enemy 是主动方
  const myLegions = getActiveLegions(); // wait no...
  // Recalculate: when AI is passive, AI's side is passive side
  // getPassiveLegions = the side that is NOT active = AI's side
  // Hmm wait, let me reconsider

  // Actually: isPlayerActive() checks (activeSide === attacker) === isPlayerAttacker
  // If player is NOT active, AI is active. If player IS active, AI is passive.
  // In aiPickPassive, AI is passive. So isPlayerActive() should be true (player is the active side).
  // Wait, let me re-check.
  //
  // isPlayerActive() = (battle.activeSide === 'attacker') === battle.isPlayerAttacker
  //
  // Case: Player defending, AI attacking. isPlayerAttacker = false.
  // At start: activeSide = attacker. isPlayerActive() = (true === false) = false. AI is active.
  // After aiPickActive: activeSide still attacker. phase = pick_passive. isPlayerActive() = false. Player is passive.
  // After continueAfterResult: activeSide swaps to defender. phase = pick_active. isPlayerActive() = (false === false) = true. Player is active!
  //
  // So in aiPickPassive:
  // - Called when phase is pick_passive AND the passive side is AI
  // - Passive side = NOT active side
  // - AI's legions are the passive legions: getPassiveLegions()
  // - Player's legions (already picked in active) are: getActiveLegions()
  // - isPlayerActive() would be true here (player is the active side who just picked)

  // Wait, that's wrong. Let me re-derive:
  // aiPickPassive is called when passive side is AI.
  // The passive side's legions are getPassiveLegions()
  // So AI's legions = getPassiveLegions()
  // And getActiveLegions() = the active side (player or another AI)

  // But in my code, I check `if (isPlayerActive())` to determine if passive is AI.
  // If isPlayerActive() is true, player is active → passive is AI ✓
  // If isPlayerActive() is false, player is passive → passive is NOT AI (it's the player)

  // So: AI's legions = getPassiveLegions() (passive = opposite of active)
  const aiLegions = getPassiveLegions();
  const aiRetreated = getPassiveRetreated();
  const playerLegions = getActiveLegions();
  const playerRetreated = getActiveRetreated();

  const aiAlive = aiLegions.map((l, i) => ({ l, i })).filter(x => x.l.troops > 0 && !aiRetreated.includes(x.i));
  const playerAlive = playerLegions.map((l, i) => ({ l, i })).filter(x => x.l.troops > 0 && !playerRetreated.includes(x.i));

  if (aiAlive.length === 0) {
    endBattle(battle.activeSide === 'attacker' ? 'attacker' : 'defender');
    return;
  }
  if (playerAlive.length === 0) {
    endBattle(battle.activeSide === 'attacker' ? 'defender' : 'attacker');
    return;
  }

  // AI 被动方：针对玩家已选武将，选择最优迎战
  const playerPickedIdx = battle._activePickedIdx;
  const playerPicked = playerLegions[playerPickedIdx];

  // 评估每个 AI 武将对上玩家出战武将的期望
  const matches = aiAlive.map(ai => ({
    ...aiEvaluateMatch(ai.i, playerPickedIdx, aiLegions, playerLegions),
    // aiEvaluateMatch expects (myIdx, enemyIdx, myLegions, enemyLegions)
    // We need AI as "my" here, but aiEvaluateMatch is designed for active=my
  }));

  // Actually, aiEvaluateMatch(myIdx, enemyIdx, myLegions, enemyLegions)
  // evaluates myLegions[myIdx] vs enemyLegions[enemyIdx]
  // We want: aiLegion vs playerLegion
  // So call: aiEvaluateMatch(aiIdx, playerIdx, aiLegions, playerLegions)
  const evals = aiAlive.map(ai => {
    const myLegion = aiLegions[ai.i];
    const enemyTroops = playerLegions[playerPickedIdx].troops;
    const enemyHero = playerLegions[playerPickedIdx].hero;
    const myPower = myLegion.troops * (1 + myLegion.hero.power / 200);
    const enemyPower = enemyTroops * (1 + (enemyHero ? enemyHero.power : 0) / 200);
    const winProb = myPower / (myPower + enemyPower);
    return {
      idx: ai.i,
      score: winProb * 2 - 1,
      winProb,
    };
  });

  evals.sort((a, b) => b.score - a.score);

  // 田忌赛马策略
  const enemyStrongest = playerAlive.reduce((a, b) => a.l.hero.power > b.l.hero.power ? a : b, playerAlive[0]);
  const myStrongest = aiAlive.reduce((a, b) => a.l.hero.power > b.l.hero.power ? a : b, aiAlive[0]);

  let chosenAiIdx;
  if (playerAlive.length > 1 && enemyStrongest.l.hero.power > myStrongest.l.hero.power + 5) {
    const myWeakest = aiAlive.reduce((a, b) => a.l.hero.power < b.l.hero.power ? a : b, aiAlive[0]);
    chosenAiIdx = myWeakest.i;
    battle.log.push({ msg: `🦊 AI策略：${aiLegions[myWeakest.i].hero.name}（弱）迎战 ${playerPicked.hero.name}（强）`, type: 'system' });
  } else {
    chosenAiIdx = evals[0].idx;
  }

  // 设置最终对战组合
  if (battle.activeSide === 'attacker') {
    battle._lastAttIdx = battle._activePickedIdx; // active=attacker picked this
    battle._lastDefIdx = chosenAiIdx;              // passive=defender picked this
  } else {
    battle._lastDefIdx = battle._activePickedIdx;  // active=defender picked this
    battle._lastAttIdx = chosenAiIdx;              // passive=attacker picked this
  }
  battle._activePickedIdx = null;

  // 进入阵型阶段
  battle.phase = 'formation';
  battle.playerFormation = null;
  battle.aiFormation = null;

  // 检查是否玩家参战（AI vs AI 不需要等待玩家选阵型）
  const isPlayerInvolved = battle.attackerId === gameState.factionId || battle.defenderId === gameState.factionId;
  if (!isPlayerInvolved) {
    // AI vs AI：自动选阵型+自动单挑
    const aiHero = (battle.activeSide === 'attacker' ? battle.attLegions[battle._lastAttIdx] : battle.defLegions[battle._lastDefIdx]).hero;
    const enemyHero = (battle.activeSide === 'attacker' ? battle.defLegions[battle._lastDefIdx] : battle.attLegions[battle._lastAttIdx]).hero;
    battle.aiFormation = aiPickFormation(aiHero);
    battle.playerFormation = aiPickFormation(enemyHero);
    renderBattle();
    setTimeout(() => { revealFormations(); autoDuel(); }, 400);
  } else {
    // AI（被动方）先选阵型，等玩家（主动方）也选了就揭示
    const aiHero = (battle.activeSide === 'attacker' ? battle.defLegions[battle._lastDefIdx] : battle.attLegions[battle._lastAttIdx]).hero;
    battle.aiFormation = aiPickFormation(aiHero);
    renderBattle();
  }
}

// 旧版 aiPickBoth 保留以供兼容（AI vs AI 的旧路径不再使用）

// ===== 战前撤退（多选武将 + 地图选目的地）=====
let pendingBattleRetreat = null; // { selectedIndices: Set }

function showRetreatHeroSelect() {
  if (!battle || battle.phase !== 'action_choice') return;

  const myLegions = getActiveLegions();
  const myRetreated = getActiveRetreated();
  const alive = myLegions.map((l, i) => ({ l, i })).filter(x => x.l.troops > 0 && !myRetreated.includes(x.i));

  if (alive.length === 0) {
    addLog('⚠️ 没有可撤退的武将！', 'bad');
    return;
  }

  pendingBattleRetreat = { selectedIndices: new Set(alive.map(x => x.i)) };

  const btnPanel = document.getElementById('battle-actions');
  let html = '<div style="font-size:14px;color:#ffa500;margin-bottom:8px;">🏃 选择要撤退的武将（可多选）：</div>';
  alive.forEach(({ l, i }) => {
    const checked = pendingBattleRetreat.selectedIndices.has(i) ? 'checked' : '';
    html += `<label style="display:block;padding:8px 10px;margin-bottom:4px;background:rgba(0,0,0,0.3);border-radius:4px;cursor:pointer;font-size:13px;">
      <input type="checkbox" ${checked} onchange="toggleBattleRetreatHero(${i})" style="margin-right:8px;">
      ⭐${l.hero.name} <span style="color:#888;">战力${l.hero.power}</span> — ${l.troops} 人
      <span style="color:#f44336;font-size:11px;">（撤退损失30%兵力）</span>
    </label>`;
  });
  html += `
    <button onclick="confirmRetreatHeroSelect()" ${pendingBattleRetreat.selectedIndices.size === 0 ? 'disabled' : ''} style="width:100%;background:linear-gradient(180deg,#8b0000,#5a0000);border-color:#ff4444;margin-top:8px;">✅ 确认撤退（${pendingBattleRetreat.selectedIndices.size}将）→ 选择目的地</button>
    <button onclick="cancelRetreatHeroSelect()" style="width:100%;background:linear-gradient(180deg,#555,#333);border-color:#888;margin-top:4px;">✖ 取消</button>
  `;
  btnPanel.innerHTML = html;
  document.getElementById('battle-phase-hint').textContent = '🏃 选择要撤出战役的武将';
}

function toggleBattleRetreatHero(idx) {
  if (!pendingBattleRetreat) return;
  const sel = pendingBattleRetreat.selectedIndices;
  if (sel.has(idx)) sel.delete(idx); else sel.add(idx);
  showRetreatHeroSelect(); // 刷新UI
}

function confirmRetreatHeroSelect() {
  if (!pendingBattleRetreat || !battle) return;
  const { selectedIndices } = pendingBattleRetreat;
  if (selectedIndices.size === 0) return;

  // 保存选中的武将索引
  pendingBattleRetreat.selectedIndices = selectedIndices;

  // 隐藏战斗界面，切换到地图模式
  document.getElementById('battle-overlay').classList.remove('active');
  document.getElementById('battle-phase-hint').textContent = '';
  document.getElementById('battle-actions').innerHTML = '<span style="color:#ffa500;">请在地图上点击相邻据点选择撤退目的地</span>';

  // 高亮可选目的地
  const activeSide = battle.activeSide;
  const fromLocId = activeSide === 'attacker' ? battle.fromLocId : battle.toLocId;
  const factionId = activeSide === 'attacker' ? battle.attackerId : battle.defenderId;
  const options = getRetreatDestinations(fromLocId, factionId);

  pendingBattleRetreat.options = options;
  pendingBattleRetreat.fromLocId = fromLocId;
  pendingBattleRetreat.factionId = factionId;

  renderMap(); // 刷新地图
  addLog('🗺️ 请在地图上点击相邻据点选择撤退目的地', 'info');
}

function cancelRetreatHeroSelect() {
  pendingBattleRetreat = null;
  battle.phase = 'action_choice';
  renderBattle();
}

// 地图点击处理（撤退模式）
function handleRetreatMapClick(locId) {
  if (!pendingBattleRetreat || !battle) return false;

  const { options, selectedIndices } = pendingBattleRetreat;
  const validDest = options.find(o => o.locationId === locId);
  if (!validDest) {
    addLog('⚠️ 请选择一个相邻的己方或中立据点！', 'bad');
    return true; // 拦截了点击
  }

  // 执行撤退
  const destLocId = validDest.locationId;
  const destName = LOCATIONS.find(l => l.id === destLocId).name;
  const activeSide = battle.activeSide;
  const myLegions = getActiveLegions();

  let retreatedCount = 0;
  selectedIndices.forEach(idx => {
    const legion = myLegions[idx];
    if (legion && legion.troops > 0) {
      const loss = Math.max(1, Math.floor(legion.troops * 0.30));
      legion.troops = Math.max(1, legion.troops - loss); // 至少保留1兵，防止武将消失
      getActiveRetreated().push(idx);
      battle.retreatDest[`${activeSide}_${idx}`] = destLocId;
      // 如果撤退到无主据点，立即占领
      if (!gameState.locations[destLocId].owner) {
        gameState.locations[destLocId].owner = pendingBattleRetreat.factionId;
      }
      battle.log.push({ msg: `🏃 ${legion.hero.name} 撤出战役至 ${destName}！（损失${loss}人）`, type: 'system' });
      retreatedCount++;
    }
  });

  if (retreatedCount > 0) {
    addLog(`🏃 ${retreatedCount}名武将撤至 ${destName}`, 'info');
  }

  pendingBattleRetreat = null;

  // 检查胜负
  const attAlive = battle.attLegions.some((l, i) => l.troops > 0 && !battle.retreated.attacker.includes(i));
  const defAlive = battle.defLegions.some((l, i) => l.troops > 0 && !battle.retreated.defender.includes(i));
  if (!attAlive) { endBattle('defender'); return true; }
  if (!defAlive) { endBattle('attacker'); return true; }

  // 切换行动方，恢复战斗界面
  battle.activeSide = (battle.activeSide === 'attacker') ? 'defender' : 'attacker';
  battle.phase = 'action_choice';
  battle._activePickedIdx = null;
  battle._aiActionTimer = null;
  document.getElementById('battle-overlay').classList.add('active');
  renderBattle();

  if (!isPlayerActive()) {
    battle._aiActionTimer = setTimeout(() => aiChooseAction(), 700);
  }

  return true; // 拦截了点击
}

// ===== 全军撤退 =====
function retreatAllLegions() {
  if (!battle || battle.phase === 'finished') return;
  if (!confirm('确定全军撤退吗？')) return;
  if (battleResultTimer) { clearTimeout(battleResultTimer); battleResultTimer = null; }

  const isPlayerAttacker = battle.isPlayerAttacker;
  const side = isPlayerAttacker ? 'attacker' : 'defender';
  const legions = isPlayerAttacker ? battle.attLegions : battle.defLegions;
  const retreated = isPlayerAttacker ? battle.retreated.attacker : battle.retreated.defender;
  const fromLocId = isPlayerAttacker ? battle.fromLocId : battle.toLocId;
  const factionId = isPlayerAttacker ? battle.attackerId : battle.defenderId;

  // 收集可用的撤退目的地
  const options = getRetreatDestinations(fromLocId, factionId);
  let optIdx = 0;

  legions.forEach((l, i) => {
    if (l.troops > 0 && !retreated.includes(i)) {
      const loss = Math.max(1, Math.floor(l.troops * (Math.random() * 0.30)));
      l.troops -= loss;
      retreated.push(i);

      // 轮流分配撤退目的地（优先己方据点）
      let destLocId = null;
      if (options.length > 0) {
        destLocId = options[optIdx % options.length].locationId;
        optIdx++;
      }

      if (destLocId) {
        battle.retreatDest[`${side}_${i}`] = destLocId;
        const destName = LOCATIONS.find(loc => loc.id === destLocId).name;
        battle.log.push({ msg: `🏃 ${l.hero.name} 全军撤退至 ${destName}！损失 ${loss} 人`, type: 'system' });
      } else {
        battle.retreatDest[`${side}_${i}`] = null;
        battle.log.push({ msg: `💀 ${l.hero.name} 无处可退，力战而亡！`, type: 'lose' });
      }
    }
  });
  // 玩家撤退 → 对方获胜，据点归对方
  endBattle(side === 'attacker' ? 'defender' : 'attacker');
}

// ===== 自动战斗 =====
function autoBattle() {
  if (!battle || battle.phase === 'finished') return;
  if (battleResultTimer) { clearTimeout(battleResultTimer); battleResultTimer = null; }

  const runRound = () => {
    if (!battle || battle.phase === 'finished') return;

    if (battle.phase === 'pick_active') {
      if (isPlayerActive()) {
        // 玩家是主动方：自动选最强武将
        const myLegions = getActiveLegions();
        const myRetreated = getActiveRetreated();
        const myAlive = myLegions.map((l, i) => ({ l, i })).filter(x => x.l.troops > 0 && !myRetreated.includes(x.i));
        if (myAlive.length === 0) {
          endBattle(battle.activeSide === 'attacker' ? 'defender' : 'attacker'); return;
        }
        myAlive.sort((a, b) => b.l.hero.power - a.l.hero.power);
        battle._activePickedIdx = myAlive[0].i;
        confirmActivePick();
      } else {
        aiPickActive();
      }
    } else if (battle.phase === 'pick_passive') {
      if (!isPlayerActive()) {
        // 玩家是被动方：自动选最强迎战
        const myLegions = getPassiveLegions();
        const myRetreated = getPassiveRetreated();
        const myAlive = myLegions.map((l, i) => ({ l, i })).filter(x => x.l.troops > 0 && !myRetreated.includes(x.i));
        if (myAlive.length === 0) {
          endBattle(battle.activeSide === 'attacker' ? 'attacker' : 'defender'); return;
        }
        myAlive.sort((a, b) => b.l.hero.power - a.l.hero.power);
        const playerSide = battle.isPlayerAttacker ? 'attacker' : 'defender';
        if (playerSide === 'attacker') {
          battle.selectedAttIdx = myAlive[0].i;
          battle.selectedDefIdx = battle._activePickedIdx;
        } else {
          battle.selectedDefIdx = myAlive[0].i;
          battle.selectedAttIdx = battle._activePickedIdx;
        }
        confirmPassivePick();
      } else {
        aiPickPassive();
      }
    } else if (battle.phase === 'pick') {
      // 旧版兼容
      if (isPlayerActive()) {
        const myLegions = getActiveLegions();
        const enemyLegions = getPassiveLegions();
        const myRetreated = getActiveRetreated();
        const enemyRetreated = getPassiveRetreated();
        const myAlive = myLegions.map((l, i) => ({ l, i })).filter(x => x.l.troops > 0 && !myRetreated.includes(x.i));
        const enemyAlive = enemyLegions.map((l, i) => ({ l, i })).filter(x => x.l.troops > 0 && !enemyRetreated.includes(x.i));
        if (myAlive.length === 0 || enemyAlive.length === 0) {
          const winner = myAlive.length > 0 ? (battle.activeSide === 'attacker' ? 'attacker' : 'defender') : (battle.activeSide === 'attacker' ? 'defender' : 'attacker');
          endBattle(winner); return;
        }
        myAlive.sort((a, b) => b.l.hero.power - a.l.hero.power);
        enemyAlive.sort((a, b) => b.l.hero.power - a.l.hero.power);
        setMySelection(myAlive[0].i);
        setEnemySelection(enemyAlive[0].i);
        confirmBattlePick();
      } else {
        // 旧版 aiPickBoth 不再存在，用新的替代
        aiPickActive();
      }
    } else if (battle.phase === 'formation') {
      // 自动选阵型（需玩家操作时自动选择）
      selectPlayerFormation(1); // 默认锋矢阵
      // AI 阵型已在 confirmPassivePick / aiPickPassive 中设置，没设置的话 selectPlayerFormation 会自动补
    } else if (battle.phase === 'duel') {
      // 自动执行单挑
      if (isPlayerInDuel()) {
        executeDuelRound();
      }
    } else if (battle.phase === 'combat_result') {
      continueAfterResult();
    }
  };

  const fastLoop = () => {
    if (!battle || battle.phase === 'finished') return;
    runRound();
    setTimeout(fastLoop, 250);
  };
  fastLoop();
}

// 修改 doAttack → 启动战斗界面
function doAttack(fromLocId, toLocId, terrain) {
  doAttackWithLegions(fromLocId, toLocId, terrain, null);
}

function doAttackWithLegions(fromLocId, toLocId, terrain, selectedIndices) {
  if (gameState.actionPoints < 1) return;
  const toLoc = LOCATIONS.find(l => l.id === toLocId);
  const fromLoc = LOCATIONS.find(l => l.id === fromLocId);
  const toOwner = gameState.locations[toLocId].owner;

  const allMyLegions = getLegionsAt(fromLocId, gameState.factionId);
  if (allMyLegions.length === 0) { addLog('⚠️ 该据点没有你的军团！', 'bad'); return; }

  // 如果指定了将领，只带选中的
  const myLegions = selectedIndices ? selectedIndices.map(i => allMyLegions[i]).filter(Boolean) : allMyLegions;

  // 检查守方是否有将防守
  const defHasForces = toOwner && getLegionsAt(toLocId, toOwner).length > 0;
  if (!defHasForces) {
    // 无将防守的据点直接占领（中立或无将的敌方据点）
    gameState.locations[toLocId].owner = gameState.factionId;
    const firstLegion = myLegions[0];
    firstLegion.locationId = toLocId;
    gameState.actionPoints -= 1;
    addLog(`🚩 兵不血刃占领 ${toLoc.name}！${firstLegion.hero.name} 移师至此。`, 'good');
    updateActionPoints();
    renderMap();
    updateUI();
    updateSidePanel();
    return;
  }

  startBattle(gameState.factionId, toOwner || '', fromLocId, toLocId, terrain, true, selectedIndices);
}
</script>

    <div class="battle-side attacker" id="battle-attacker-side">

    <div style="width:2px;background:#8b6914;flex-shrink:0;"></div>
    <div class="battle-side defender" id="battle-defender-side">

    <button id="btn-auto-battle" onclick="autoBattle()">⚡ 自动战斗</button>

  </div>

</div>
